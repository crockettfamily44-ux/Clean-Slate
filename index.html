<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Clean Slate</title>
  <!-- Tailwind CSS for styling -->
  <script src="https://cdn.tailwindcss.com"></script>
  <!-- Alpine.js for interactive clicks -->
  <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
</head>
<body class="bg-slate-50 font-sans text-slate-900 antialiased flex justify-center selection:bg-indigo-100">

  <div class="w-full max-w-md p-6 min-h-screen">
    
    <!-- Header -->
    <header class="mb-8 mt-4">
      <h1 class="text-3xl font-light tracking-tight text-slate-800">Clean Slate.</h1>
      <p class="text-slate-500 mt-1">You're at 0% of your daily goal.</p>
    </header>

    <!-- Habit Card 1: Fitness -->
    <!-- The x-data="{ checked: false }" handles the logic. The @click toggles it! -->
    <div x-data="{ checked: false }" 
         @click="checked = !checked" 
         :class="checked ? 'bg-indigo-600 text-white shadow-md' : 'bg-white/80 backdrop-blur-md border-slate-200 shadow-sm'"
         class="relative overflow-hidden cursor-pointer border rounded-3xl p-6 mb-4 transition-all duration-300 hover:shadow-md transform active:scale-95">
      
      <div class="flex justify-between items-center relative z-10">
        <div>
          <p :class="checked ? 'text-indigo-200' : 'text-slate-400'" class="text-xs uppercase tracking-widest font-semibold transition-colors">Fitness</p>
          <h2 class="text-xl font-medium mt-1">400m Interval Training</h2>
        </div>
        
        <!-- Icon: Changes based on checked state -->
        <svg x-show="!checked" xmlns="http://www.w3.org/2000/svg" class="w-8 h-8 text-slate-300" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
          <circle cx="12" cy="12" r="9" />
        </svg>
        <svg x-show="checked" style="display: none;" xmlns="http://www.w3.org/2000/svg" class="w-8 h-8 text-white" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
          <path stroke-linecap="round" stroke-linejoin="round" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z" />
        </svg>
      </div>

      <!-- Background Wave Graphic -->
      <div class="absolute bottom-0 left-0 w-full opacity-10 pointer-events-none">
        <svg viewBox="0 0 1440 320" class="w-full h-16 object-cover">
          <path fill="currentColor" d="M0,160L48,176C96,192,192,224,288,213.3C384,203,480,149,576,149.3C672,149,768,203,864,213.3C960,224,1056,192,1152,165.3C1248,139,1344,117,1392,106.7L1440,96L1440,320L1392,320C1344,320,1248,320,1152,320C1056,320,960,320,864,320C768,320,672,320,576,320C480,320,384,320,288,320C192,320,96,320,48,320L0,320Z"></path>
        </svg>
      </div>
    </div>

    <!-- Habit Card 2: Diet -->
    <div x-data="{ checked: false }" 
         @click="checked = !checked" 
         :class="checked ? 'bg-indigo-600 text-white shadow-md' : 'bg-white/80 backdrop-blur-md border-slate-200 shadow-sm'"
         class="relative overflow-hidden cursor-pointer border rounded-3xl p-6 mb-8 transition-all duration-300 hover:shadow-md transform active:scale-95">
      
      <div class="flex justify-between items-center relative z-10">
        <div>
          <p :class="checked ? 'text-indigo-200' : 'text-slate-400'" class="text-xs uppercase tracking-widest font-semibold transition-colors">Diet</p>
          <h2 class="text-xl font-medium mt-1">Log Daily Macros</h2>
        </div>
        
        <svg x-show="!checked" xmlns="http://www.w3.org/2000/svg" class="w-8 h-8 text-slate-300" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
          <circle cx="12" cy="12" r="9" />
        </svg>
        <svg x-show="checked" style="display: none;" xmlns="http://www.w3.org/2000/svg" class="w-8 h-8 text-white" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
          <path stroke-linecap="round" stroke-linejoin="round" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z" />
        </svg>
      </div>

      <div class="absolute bottom-0 left-0 w-full opacity-10 pointer-events-none">
        <svg viewBox="0 0 1440 320" class="w-full h-16 object-cover">
          <path fill="currentColor" d="M0,160L48,176C96,192,192,224,288,213.3C384,203,480,149,576,149.3C672,149,768,203,864,213.3C960,224,1056,192,1152,165.3C1248,139,1344,117,1392,106.7L1440,96L1440,320L1392,320C1344,320,1248,320,1152,320C1056,320,960,320,864,320C768,320,672,320,576,320C480,320,384,320,288,320C192,320,96,320,48,320L0,320Z"></path>
        </svg>
      </div>
    </div>

    <!-- Benchmark Widget -->
    <div class="bg-white rounded-3xl p-6 shadow-sm border border-slate-200">
      <div class="flex items-center gap-2 mb-6 text-slate-600">
        <svg xmlns="http://www.w3.org/2000/svg" class="w-5 h-5 text-indigo-500" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
          <path stroke-linecap="round" stroke-linejoin="round" d="M13 7h8m0 0v8m0-8l-8 8-4-4-6 6" />
        </svg>
        <span class="text-sm font-medium">Peer Comparison (Males, 45)</span>
      </div>
      
      <div class="relative h-2 bg-slate-100 rounded-full mb-8 mt-2">
        <div class="absolute top-1/2 -translate-y-1/2 w-4 h-4 bg-indigo-500 rounded-full border-2 border-white shadow-md" style="left: 85%;"></div>
        <div class="absolute top-4 left-0 text-[10px] text-slate-400 font-medium tracking-wide uppercase">Average</div>
        <div class="absolute top-4 right-0 text-[10px] text-slate-400 font-medium tracking-wide uppercase">Elite</div>
      </div>
      <p class="text-sm text-slate-500 text-center mt-2">
        Your consistency is in the <span class="text-indigo-600 font-bold">Top 15%</span>.
      </p>
    </div>

  </div>
</body>
</html>
