<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Clean Slate</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/sortablejs@latest/Sortable.min.js"></script>
  <script defer src="https://cdn.jsdelivr.net/npm/@alpinejs/persist@3.x.x/dist/cdn.min.js"></script>
  <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
  <style> 
    [x-cloak] { display: none !important; } 
    .sortable-ghost { opacity: 0.4; transform: scale(0.95); }
    .sortable-drag { box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.1), 0 10px 10px -5px rgba(0, 0, 0, 0.04); }
  </style>
</head>
<body class="bg-gradient-to-br from-emerald-50 via-white to-slate-50 font-sans text-slate-900 antialiased overflow-x-hidden selection:bg-emerald-100 min-h-screen" x-data="habitApp">

  <audio id="clickSound" src="https://assets.mixkit.co/active_storage/sfx/2995/2995-preview.mp3" preload="auto"></audio>

  <div class="w-full pb-40">
    <div class="max-w-6xl mx-auto p-6 md:p-10">
      
      <header class="flex flex-col xl:flex-row justify-between items-start xl:items-end mb-10 gap-6">
        <div>
          <div class="flex items-center gap-4">
            <input type="file" x-ref="profileUpload" accept="image/*" class="hidden" @change="handleProfileUpload">
            <div @click="$refs.profileUpload.click()" class="w-14 h-14 rounded-full border-2 border-slate-300 bg-slate-100 overflow-hidden cursor-pointer shadow-sm hover:border-emerald-500 hover:shadow-md transition-all flex items-center justify-center shrink-0">
              <template x-if="profileImage">
                <img :src="profileImage" class="w-full h-full object-cover">
              </template>
              <template x-if="!profileImage">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6 text-slate-400" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z" /></svg>
              </template>
            </div>
            
            <div>
              <h1 class="text-4xl font-light tracking-tight text-slate-900 drop-shadow-sm">Clean Slate.</h1>
              <p class="text-slate-600 mt-1 font-medium text-sm">
                <span x-text="currentDayString" class="font-bold text-emerald-700"></span> • 
                <span x-text="currentDayHabits.length"></span> habits today • <span x-text="totalDailyMinutes"></span> min
              </p>
            </div>
          </div>
          
          <div class="flex flex-wrap gap-2 mt-6">
            <button @click="openAddModal()" class="text-sm font-medium text-white bg-emerald-600 border border-emerald-800 hover:bg-emerald-700 transition-colors px-5 py-2 rounded-full shadow-sm hover:shadow-md transform active:scale-95">
              + Add Habit
            </button>
            <button @click="isEditing = !isEditing" :class="isEditing ? 'bg-emerald-100 text-emerald-800 border-emerald-800 shadow-inner' : 'bg-white text-slate-700 border-slate-800 shadow-sm'" class="text-sm font-medium border transition-all px-5 py-2 rounded-full w-24 transform active:scale-95">
              <span x-text="isEditing ? 'Done' : 'Edit'"></span>
            </button>
            <button @click="isHistoryModalOpen = true" class="text-sm font-medium bg-slate-800 text-white border border-slate-900 hover:bg-slate-700 transition-colors px-5 py-2 rounded-full shadow-sm hover:shadow-md transform active:scale-95 flex items-center gap-2">
              <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M9 19v-6a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2a2 2 0 002-2zm0 0V9a2 2 0 012-2h2a2 2 0 012 2v10m-6 0a2 2 0 002 2h2a2 2 0 002-2m0 0V5a2 2 0 012-2h2a2 2 0 012 2v14a2 2 0 01-2 2h-2a2 2 0 01-2-2z" /></svg>
              Stats
            </button>
          </div>
        </div>

        <div class="flex flex-col md:flex-row gap-4 w-full xl:w-auto">
          <div class="w-full md:w-64 bg-white p-4 rounded-2xl shadow-sm border border-slate-800 flex flex-col justify-between">
            <div class="flex justify-between items-center mb-3">
              <span class="text-[10px] uppercase tracking-widest text-slate-500 font-bold flex items-center gap-1">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4 text-emerald-500" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z" /></svg>
                Sync (Live)
              </span>
            </div>
            <div class="space-y-2.5">
              <div>
                <div class="flex justify-between text-[10px] font-bold mb-1"><span class="text-rose-500">MOVE</span><span class="text-slate-700"><span x-text="healthData.calories"></span> / <span x-text="healthData.goalCalories"></span> cal</span></div>
                <div class="w-full h-1.5 bg-slate-100 border border-slate-200 rounded-full overflow-hidden"><div class="h-full bg-rose-500 rounded-full" :style="`width: ${Math.min((healthData.calories / healthData.goalCalories) * 100, 100)}%`"></div></div>
              </div>
              <div>
                <div class="flex justify-between text-[10px] font-bold mb-1"><span class="text-emerald-500">EXERCISE</span><span class="text-slate-700"><span x-text="healthData.exercise"></span> / <span x-text="healthData.goalExercise"></span> min</span></div>
                <div class="w-full h-1.5 bg-slate-100 border border-slate-200 rounded-full overflow-hidden"><div class="h-full bg-emerald-500 rounded-full" :style="`width: ${Math.min((healthData.exercise / healthData.goalExercise) * 100, 100)}%`"></div></div>
              </div>
              <div>
                <div class="flex justify-between text-[10px] font-bold mb-1"><span class="text-cyan-500">SLEEP</span><span class="text-slate-700"><span x-text="healthData.sleep"></span> / <span x-text="healthData.goalSleep"></span> hr</span></div>
                <div class="w-full h-1.5 bg-slate-100 border border-slate-200 rounded-full overflow-hidden"><div class="h-full bg-cyan-500 rounded-full" :style="`width: ${Math.min((healthData.sleep / healthData.goalSleep) * 100, 100)}%`"></div></div>
              </div>
            </div>
          </div>
        </div>
      </header>

      <div class="grid grid-cols-1 md:grid-cols-3 gap-8">
        <template x-for="timeBlock in ['morning', 'afternoon', 'evening']" :key="timeBlock">
          <div>
            <div class="mb-4">
              <h2 class="flex justify-between items-end mb-2 border-b border-slate-300 pb-2">
                <span class="text-xs uppercase tracking-widest text-slate-600 font-bold" x-text="timeBlock"></span>
                
                <div class="flex items-center gap-1">
                  <span class="text-[10px] text-slate-500 font-bold" x-text="blockMinutes(timeBlock) + ' / '"></span>
                  <template x-if="!isEditing">
                    <span class="text-[10px] text-slate-500 font-bold" x-text="blockGoals[timeBlock] + ' min'"></span>
                  </template>
                  <template x-if="isEditing">
                    <input type="number" x-model="blockGoals[timeBlock]" class="w-12 text-[10px] font-bold border border-emerald-400 bg-emerald-50 text-emerald-800 rounded px-1 outline-none text-center h-4">
                  </template>
                </div>
              </h2>
              <div class="w-full h-1 bg-slate-200 rounded-full overflow-hidden border border-slate-300">
                <div class="h-full bg-slate-400 transition-all duration-700" :style="'width: ' + Math.min((blockMinutes(timeBlock) / blockGoals[timeBlock]) * 100, 100) + '%'"></div>
              </div>
            </div>
            
            <div :id="'list-' + timeBlock" :data-time="timeBlock" class="min-h-[100px]">
              <template x-for="habit in currentDayHabits.filter(h => h.timeOfDay === timeBlock)" :key="habit.id">
                
                <div :data-id="habit.id"
                     @click="if(!isEditing && !habit.isLocked) toggleHabit(habit.id);" 
                     :class="[
                        isEditing && !habit.isLocked ? 'border-emerald-400 bg-emerald-50 border-dashed cursor-default' : 'bg-white border-slate-800 shadow-sm hover:shadow-md',
                        !isEditing && !habit.isLocked ? 'cursor-pointer active:scale-95' : '',
                        habit.isLocked ? 'locked-card border-slate-300 bg-slate-50/50' : ''
                     ]"
                     class="habit-card relative overflow-hidden border rounded-3xl p-5 mb-4 transition-all duration-300 transform group">
                  
                  <div class="absolute bottom-0 left-0 w-full bg-gradient-to-t from-emerald-600 via-emerald-300 to-slate-100 transition-all duration-[2000ms] ease-in-out z-0"
                       :class="habit.checked && (!isEditing || habit.isLocked) ? 'h-full' : 'h-0'"></div>

                  <div class="flex items-center gap-3 relative z-10 pointer-events-none">
                    <template x-if="!habit.isLocked">
                      <div @click.stop class="drag-handle pointer-events-auto text-slate-300 hover:text-slate-500 cursor-grab active:cursor-grabbing p-2 -ml-3 transition-colors">
                        <svg class="w-5 h-5" fill="currentColor" viewBox="0 0 24 24"><path d="M8 6a2 2 0 1 1-4 0 2 2 0 0 1 4 0zM8 12a2 2 0 1 1-4 0 2 2 0 0 1 4 0zM8 18a2 2 0 1 1-4 0 2 2 0 0 1 4 0zM20 6a2 2 0 1 1-4 0 2 2 0 0 1 4 0zM20 12a2 2 0 1 1-4 0 2 2 0 0 1 4 0zM20 18a2 2 0 1 1-4 0 2 2 0 0 1 4 0z"/></svg>
                      </div>
                    </template>
                    <template x-if="habit.isLocked">
                      <div class="p-2 -ml-2 text-slate-400">
                        <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z" /></svg>
                      </div>
                    </template>

                    <div class="flex-1 flex justify-between items-start">
                      <div>
                        <div class="flex items-center gap-2 mb-1">
                          <span class="text-lg drop-shadow-sm" x-text="habit.isLocked ? '⌚' : categoryIcons[habit.category]"></span>
                          <p :class="habit.checked && (!isEditing || habit.isLocked) ? 'text-emerald-900 delay-500' : 'text-slate-500'" 
                             class="text-[10px] uppercase tracking-widest font-bold transition-colors duration-1000">
                            <span x-text="habit.category"></span>
                          </p>
                        </div>
                        <h2 :class="habit.checked && (!isEditing || habit.isLocked) ? 'text-slate-900 delay-500' : 'text-slate-900'" 
                            class="text-lg font-medium leading-tight pr-4 transition-colors duration-1000" 
                            x-text="habit.title"></h2>
                      </div>
                      
                      <template x-if="!isEditing || habit.isLocked">
                        <div>
                          <svg x-show="!habit.checked" xmlns="http://www.w3.org/2000/svg" class="w-7 h-7 text-slate-300 group-hover:text-slate-400 transition-colors mt-1" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="9" /></svg>
                          <svg x-show="habit.checked" x-cloak x-transition.opacity.duration.1000ms xmlns="http://www.w3.org/2000/svg" class="w-7 h-7 text-emerald-800 mt-1 drop-shadow-sm" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z" /></svg>
                        </div>
                      </template>

                      <template x-if="isEditing && !habit.isLocked">
                        <div class="flex flex-col gap-2 items-center pointer-events-auto">
                          <button @click.stop="openEditModal(habit)" class="text-slate-500 hover:text-white hover:bg-slate-800 p-1.5 bg-white border border-slate-300 rounded-full shadow-sm transition-all hover:scale-110 mt-1">
                            <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M15.232 5.232l3.536 3.536m-2.036-5.036a2.5 2.5 0 113.536 3.536L6.5 21.036H3v-3.572L16.732 3.732z" /></svg>
                          </button>
                          <button @click.stop="deleteHabit(habit.id)" class="text-red-500 hover:text-white hover:bg-red-500 p-1.5 bg-red-50 border border-red-200 rounded-full shadow-sm transition-all hover:scale-110">
                            <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" viewBox="0 0 20 20" fill="currentColor"><path fill-rule="evenodd" d="M4.293 4.293a1 1 0 011.414 0L10 8.586l4.293-4.293a1 1 0 111.414 1.414L11.414 10l4.293 4.293a1 1 0 01-1.414 1.414L10 11.414l-4.293 4.293a1 1 0 01-1.414-1.414L8.586 10 4.293 5.707a1 1 0 010-1.414z" clip-rule="evenodd" /></svg>
                          </button>
                        </div>
                      </template>
                    </div>
                  </div>
                </div>
              </template>
            </div>
          </div>
        </template>
      </div>
    </div>
  </div>

  <div class="fixed bottom-0 left-0 w-full bg-white border-t border-slate-800 z-20 shadow-[0_-20px_40px_-10px_rgba(0,0,0,0.1)] flex flex-col">
    <div class="p-4 px-6 md:px-10 flex items-center gap-4 border-b border-slate-200 bg-white">
      <div class="font-bold text-sm text-slate-800 whitespace-nowrap w-24">Daily Goals</div>
      <div class="flex-1 h-3 bg-slate-100 border border-slate-300 rounded-full overflow-hidden relative shadow-inner">
        <div class="absolute top-0 left-0 h-full bg-gradient-to-r from-emerald-500 to-emerald-400 transition-all duration-1000 ease-out" :style="`width: ${dailyProgressPercentage}%`"></div>
      </div>
      <div class="font-black text-emerald-600 w-12 text-right"><span x-text="dailyProgressPercentage"></span>%</div>
    </div>
    <div class="p-3 px-6 md:px-10 flex items-center gap-4 bg-slate-50">
      <div class="font-bold text-xs text-slate-500 whitespace-nowrap w-24 uppercase tracking-widest">Weekly Avg</div>
      <div class="flex-1 h-2 bg-slate-200 border border-slate-300 rounded-full overflow-hidden relative shadow-inner">
        <div class="absolute top-0 left-0 h-full bg-gradient-to-r from-indigo-500 to-indigo-400 transition-all duration-1000 ease-out" style="width: 35%;"></div>
      </div>
      <div class="font-black text-indigo-500 w-12 text-right text-xs">35%</div>
    </div>
  </div>

  <div x-show="isAddModalOpen" x-cloak x-transition.opacity class="fixed inset-0 z-50 flex items-center justify-center bg-slate-900/60 backdrop-blur-sm p-4 overflow-y-auto">
    <div @click.away="isAddModalOpen = false" class="bg-white rounded-3xl p-6 w-full max-w-sm shadow-2xl border border-slate-800 transform transition-all my-8">
      <h3 class="text-xl font-bold mb-4 text-slate-900" x-text="editingHabitId ? 'Edit Habit' : 'New Habit'"></h3>
      
      <template x-if="habitTemplates.length > 0 && !editingHabitId">
        <div class="mb-6 pb-4 border-b border-slate-200">
          <label class="block text-[10px] uppercase tracking-widest font-bold text-slate-400 mb-2">Saved Library</label>
          <div class="flex flex-wrap gap-2">
            <template x-for="temp in habitTemplates" :key="temp.title">
              <div class="flex items-center bg-emerald-50 border border-emerald-200 rounded-lg overflow-hidden text-xs font-bold text-emerald-800 shadow-sm transition-transform active:scale-95">
                <button @click="fillFromTemplate(temp)" class="px-3 py-1.5 hover:bg-emerald-100 transition-colors whitespace-nowrap" x-text="temp.title"></button>
                <button @click="deleteTemplate(temp.title)" class="px-2 py-1.5 border-l border-emerald-200 hover:bg-red-500 hover:text-white hover:border-red-500 transition-colors text-emerald-600/50">&times;</button>
              </div>
            </template>
          </div>
        </div>
      </template>

      <div class="space-y-4">
        <div>
          <label class="block text-xs uppercase tracking-widest font-bold text-slate-600 mb-1">Title</label>
          <input x-model="newHabit.title" type="text" placeholder="e.g., Water the lawn" class="w-full bg-slate-50 border border-slate-300 rounded-xl px-4 py-3 outline-none focus:border-emerald-600 focus:ring-1 focus:ring-emerald-600 transition-all shadow-inner font-medium text-slate-800">
        </div>
        
        <div class="grid grid-cols-2 gap-4">
          <div>
            <label class="block text-xs uppercase tracking-widest font-bold text-slate-600 mb-1">Category</label>
            <select x-model="newHabit.category" class="w-full bg-slate-50 border border-slate-300 rounded-xl px-4 py-3 outline-none focus:border-emerald-600 appearance-none shadow-inner font-medium text-slate-800">
              <template x-for="cat in Object.keys(categoryIcons)">
                <option :value="cat" x-text="cat"></option>
              </template>
            </select>
          </div>
          <div>
            <label class="block text-xs uppercase tracking-widest font-bold text-slate-600 mb-1">Time Block</label>
            <select x-model="newHabit.timeOfDay" class="w-full bg-slate-50 border border-slate-300 rounded-xl px-4 py-3 outline-none focus:border-emerald-600 appearance-none shadow-inner font-medium text-slate-800">
              <option value="morning">Morning</option>
              <option value="afternoon">Afternoon</option>
              <option value="evening">Evening</option>
            </select>
          </div>
        </div>

        <div>
          <label class="block text-xs uppercase tracking-widest font-bold text-slate-600 mb-1">Duration (Min)</label>
          <input x-model="newHabit.duration" type="number" step="5" class="w-full bg-slate-50 border border-slate-300 rounded-xl px-4 py-3 outline-none focus:border-emerald-600 shadow-inner font-medium text-slate-800">
        </div>

        <div class="pt-2">
          <label class="block text-xs uppercase tracking-widest font-bold text-slate-600 mb-2">Days to Schedule</label>
          <div class="flex justify-between gap-1">
            <template x-for="day in daysOfWeek" :key="day">
              <button @click="toggleDay(day)" 
                      :class="newHabit.days.includes(day) ? 'bg-emerald-600 text-white border-emerald-800 shadow-inner' : 'bg-slate-50 text-slate-400 border-slate-200'"
                      class="flex-1 py-2 text-[10px] font-bold rounded-lg border uppercase transition-colors" x-text="day"></button>
            </template>
          </div>
        </div>
      </div>

      <div class="mt-8 flex gap-3">
        <button @click="isAddModalOpen = false" class="flex-1 bg-white border border-slate-800 text-slate-800 font-bold py-3 rounded-xl transition-colors shadow-sm active:scale-95 transform hover:bg-slate-50">Cancel</button>
        <button @click="saveHabit()" class="flex-1 bg-emerald-600 border border-emerald-800 hover:bg-emerald-700 text-white font-bold py-3 rounded-xl shadow-md transition-colors active:scale-95 transform">Save</button>
      </div>
    </div>
  </div>

  <div x-show="isHistoryModalOpen" x-cloak x-transition.opacity class="fixed inset-0 z-50 flex items-center justify-center bg-slate-900/60 backdrop-blur-sm p-4">
    <div @click.away="isHistoryModalOpen = false" class="bg-white rounded-3xl p-6 w-full max-w-md shadow-2xl border border-slate-800 transform transition-all relative">
      <button @click="isHistoryModalOpen = false" class="absolute top-4 right-4 text-slate-400 hover:text-slate-800"><svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M6 18L18 6M6 6l12 12" /></svg></button>
      <h3 class="text-xl font-bold mb-6 text-slate-900">Weekly Stats</h3>
      <div class="w-full h-40 bg-slate-50 border border-slate-200 rounded-xl shadow-inner flex items-end justify-between p-4 mb-6">
         <div class="w-8 bg-indigo-200 rounded-t-md relative group"><div class="absolute -top-6 left-1/2 -translate-x-1/2 text-[10px] font-bold text-slate-500 opacity-0 group-hover:opacity-100 transition-opacity">40%</div></div>
         <div class="w-8 bg-indigo-300 rounded-t-md h-[50%] relative group"><div class="absolute -top-6 left-1/2 -translate-x-1/2 text-[10px] font-bold text-slate-500 opacity-0 group-hover:opacity-100 transition-opacity">50%</div></div>
         <div class="w-8 bg-indigo-400 rounded-t-md h-[80%] relative group"><div class="absolute -top-6 left-1/2 -translate-x-1/2 text-[10px] font-bold text-slate-500 opacity-0 group-hover:opacity-100 transition-opacity">80%</div></div>
         <div class="w-8 bg-emerald-400 rounded-t-md h-[95%] relative group"><div class="absolute -top-6 left-1/2 -translate-x-1/2 text-[10px] font-bold text-emerald-600 opacity-0 group-hover:opacity-100 transition-opacity">95%</div></div>
         <div class="w-8 bg-indigo-200 rounded-t-md h-[30%] relative group"><div class="absolute -top-6 left-1/2 -translate-x-1/2 text-[10px] font-bold text-slate-500 opacity-0 group-hover:opacity-100 transition-opacity">30%</div></div>
         <div class="w-8 bg-indigo-300 rounded-t-md h-[60%] relative group"><div class="absolute -top-6 left-1/2 -translate-x-1/2 text-[10px] font-bold text-slate-500 opacity-0 group-hover:opacity-100 transition-opacity">60%</div></div>
         <div class="w-8 bg-indigo-200 rounded-t-md h-[40%] relative group"><div class="absolute -top-6 left-1/2 -translate-x-1/2 text-[10px] font-bold text-slate-500 opacity-0 group-hover:opacity-100 transition-opacity">40%</div></div>
      </div>
      <div class="flex justify-between text-[10px] font-bold text-slate-400 uppercase tracking-widest px-2"><span>M</span><span>T</span><span>W</span><span>T</span><span>F</span><span>S</span><span>S</span></div>
      <p class="text-sm text-slate-500 text-center mt-6">Database logic for a 7-day rolling average will be connected here.</p>
    </div>
  </div>

  <script>
    document.addEventListener('alpine:init', () => {
      Alpine.data('habitApp', () => ({
        isEditing: false,
        isAddModalOpen: false,
        isHistoryModalOpen: false,
        editingHabitId: null, 
        
        daysOfWeek: ['Mon', 'Tue', 'Wed', 'Thu', 'Fri', 'Sat', 'Sun'],
        currentDayString: new Date().toLocaleDateString('en-US', { weekday: 'short' }),
        
        profileImage: Alpine.$persist(null),
        blockGoals: Alpine.$persist({ morning: 120, afternoon: 120, evening: 120 }),
        habitTemplates: Alpine.$persist([]),

        // Live Health Data State
        healthData: { calories: 0, goalCalories: 600, exercise: 0, goalExercise: 30, sleep: 0, goalSleep: 8 },

        // Fetch Data from Supabase
        async fetchHealthData() {
          // Keys are hardcoded securely for your specific project fetch
          const supabaseUrl = 'https://vzkkjpaqteiqyomwalzr.supabase.co'; 
          const anonKey = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InZ6a2tqcGFxdGVpcXlvbXdhbHpyIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzgzNjIwNjAsImV4cCI6MjA5MzkzODA2MH0.xu0nctOWwIPWQ5E-MzypSLOhhZmsIj-Np5o992tXN_Q'; 
          
          const today = new Date();
          const dateString = today.toISOString().split('T')[0];

          try {
            const response = await fetch(`${supabaseUrl}/rest/v1/health_metrics?date=eq.${dateString}&select=*`, {
              headers: {
                'apikey': anonKey,
                'Authorization': `Bearer ${anonKey}`
              }
            });
            const data = await response.json();
            
            if (data && data.length > 0) {
              const todayData = data[data.length - 1]; 
              this.healthData.calories = todayData.calories || 0;
              this.healthData.exercise = todayData.exercise || 0;
              this.healthData.sleep = todayData.sleep ? Math.round(todayData.sleep * 10) / 10 : 0; 
            }
          } catch (error) {
            console.log("Could not fetch Apple Watch data:", error);
          }
        },

        lastOpenedDate: Alpine.$persist(new Date().toDateString()),
        habits: Alpine.$persist([
          { id: 1, title: 'Morning Reading', timeOfDay: 'morning', category: 'Faith', duration: 15, checked: false, order: 0, days: ['Mon', 'Tue', 'Wed', 'Thu', 'Fri', 'Sat', 'Sun'] },
          { id: 2, title: 'Review School Data', timeOfDay: 'afternoon', category: 'Work', duration: 60, checked: false, order: 1, days: ['Mon', 'Tue', 'Wed', 'Thu', 'Fri'] }
        ]),
        
        categoryIcons: { 'Faith': '🕊️', 'Family': '👨‍👩‍👧', 'Friends/Others': '🤝', 'Health/Sleep': '🏃', 'Work': '💼', 'Home': '🏠', 'Leisure': '📖' },
        newHabit: { title: '', category: 'Health/Sleep', timeOfDay: 'morning', duration: 15, days: ['Mon', 'Tue', 'Wed', 'Thu', 'Fri', 'Sat', 'Sun'] },

        init() {
          const today = new Date().toDateString();
          if (this.lastOpenedDate !== today) {
            this.habits.forEach(habit => habit.checked = false);
            this.lastOpenedDate = today;
          }

          this.habits.forEach((h, i) => { 
             if(h.order === undefined) h.order = i; 
             if(!h.days) h.days = ['Mon', 'Tue', 'Wed', 'Thu', 'Fri', 'Sat', 'Sun'];
          });

          // Fetch the live health data when the app loads
          this.fetchHealthData();

          this.$nextTick(() => {
            ['morning', 'afternoon', 'evening'].forEach(timeBlock => {
              const el = document.getElementById('list-' + timeBlock);
              new Sortable(el, {
                group: 'shared',
                handle: '.drag-handle',
                animation: 150,
                filter: '.locked-card, button', 
                onEnd: (evt) => {
                  const itemEl = evt.item;
                  const habitId = parseInt(itemEl.dataset.id);
                  if(isNaN(habitId)) return; 

                  const newTimeOfDay = evt.to.dataset.time;
                  
                  const newOrders = {};
                  ['morning', 'afternoon', 'evening'].forEach(time => {
                    const listEl = document.getElementById('list-' + time);
                    const idsInDom = Array.from(listEl.querySelectorAll('.habit-card')).map(e => parseInt(e.dataset.id)).filter(id => !isNaN(id));
                    idsInDom.forEach((id, newIndex) => { newOrders[id] = newIndex; });
                  });

                  if (evt.from !== evt.to) { evt.from.appendChild(itemEl); }
                  
                  const habitToMove = this.habits.find(h => h.id === habitId);
                  if(habitToMove) habitToMove.timeOfDay = newTimeOfDay;
                  
                  this.habits.forEach(h => { if (newOrders[h.id] !== undefined) h.order = newOrders[h.id]; });
                  this.habits = [...this.habits];
                }
              });
            });
          });
        },

        handleProfileUpload(event) {
          const file = event.target.files[0];
          if(!file) return;
          const reader = new FileReader();
          reader.onload = (e) => { this.profileImage = e.target.result; };
          reader.readAsDataURL(file);
        },

        get combinedHabits() {
          const healthTiles = [
            { id: 'h_move', title: `Close Move Ring`, timeOfDay: 'morning', category: 'Health/Sync', duration: 30, checked: this.healthData.calories >= this.healthData.goalCalories, isLocked: true, order: -3, days: this.daysOfWeek },
            { id: 'h_ex', title: `Close Exercise Ring`, timeOfDay: 'afternoon', category: 'Health/Sync', duration: 30, checked: this.healthData.exercise >= this.healthData.goalExercise, isLocked: true, order: -2, days: this.daysOfWeek },
            { id: 'h_sleep', title: `Hit Sleep Target`, timeOfDay: 'evening', category: 'Health/Sync', duration: 30, checked: this.healthData.sleep >= this.healthData.goalSleep, isLocked: true, order: -1, days: this.daysOfWeek }
          ];
          return [...healthTiles, ...this.habits].sort((a, b) => (a.order || 0) - (b.order || 0));
        },

        get currentDayHabits() {
          return this.combinedHabits.filter(h => h.days.includes(this.currentDayString));
        },

        blockMinutes(block) {
          return this.currentDayHabits.filter(h => h.timeOfDay === block).reduce((sum, h) => sum + h.duration, 0);
        },

        toggleHabit(id) {
          const habit = this.habits.find(h => h.id === id);
          if (habit) {
            habit.checked = !habit.checked;
            if (habit.checked) {
              const audio = document.getElementById('clickSound');
              audio.currentTime = 0; 
              audio.play().catch(e => console.log("Audio play failed"));
            }
          }
        },

        deleteHabit(id) {
          this.habits = this.habits.filter(h => h.id !== id);
        },

        fillFromTemplate(temp) {
          this.newHabit.title = temp.title;
          this.newHabit.category = temp.category;
          this.newHabit.duration = temp.duration;
          this.newHabit.timeOfDay = temp.timeOfDay;
        },
        deleteTemplate(title) {
          this.habitTemplates = this.habitTemplates.filter(t => t.title !== title);
        },

        toggleDay(day) {
          if (this.newHabit.days.includes(day)) {
            this.newHabit.days = this.newHabit.days.filter(d => d !== day);
          } else {
            this.newHabit.days.push(day);
          }
        },

        openAddModal() {
          this.editingHabitId = null;
          this.newHabit = { title: '', category: 'Health/Sleep', timeOfDay: 'morning', duration: 15, days: [...this.daysOfWeek] };
          this.isAddModalOpen = true;
        },

        openEditModal(habit) {
          this.editingHabitId = habit.id;
          this.newHabit = { title: habit.title, category: habit.category, timeOfDay: habit.timeOfDay, duration: habit.duration, days: [...habit.days] };
          this.isAddModalOpen = true;
        },

        saveHabit() {
          if (!this.newHabit.title.trim() || this.newHabit.days.length === 0) return; 
          
          if (!this.habitTemplates.some(t => t.title.toLowerCase() === this.newHabit.title.toLowerCase())) {
            this.habitTemplates.push({
              title: this.newHabit.title, category: this.newHabit.category, timeOfDay: this.newHabit.timeOfDay, duration: parseInt(this.newHabit.duration)
            });
          }

          if (this.editingHabitId) {
            const index = this.habits.findIndex(h => h.id === this.editingHabitId);
            if (index > -1) {
              this.habits[index].title = this.newHabit.title;
              this.habits[index].category = this.newHabit.category;
              this.habits[index].timeOfDay = this.newHabit.timeOfDay;
              this.habits[index].duration = parseInt(this.newHabit.duration) || 5;
              this.habits[index].days = [...this.newHabit.days];
            }
          } else {
            this.habits.push({
              id: Date.now(), title: this.newHabit.title, timeOfDay: this.newHabit.timeOfDay, category: this.newHabit.category, duration: parseInt(this.newHabit.duration) || 5, checked: false, order: 999, days: [...this.newHabit.days]
            });
          }
          this.isAddModalOpen = false;
        },

        get totalDailyMinutes() { return this.currentDayHabits.reduce((total, habit) => total + habit.duration, 0); },
        get completedDailyMinutes() { return this.currentDayHabits.filter(h => h.checked).reduce((total, habit) => total + habit.duration, 0); },
        get dailyProgressPercentage() {
          if (this.totalDailyMinutes === 0) return 0;
          return Math.round((this.completedDailyMinutes / this.totalDailyMinutes) * 100);
        }
      }))
    })
  </script>
</body>
</html>
