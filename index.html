<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Clean Slate</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/sortablejs@latest/Sortable.min.js"></script>
  <script defer src="https://cdn.jsdelivr.net/npm/@alpinejs/persist@3.x.x/dist/cdn.min.js"></script>
  <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
  <style> 
    [x-cloak] { display: none !important; } 
    .sortable-ghost { opacity: 0.4; transform: scale(0.95); }
    .sortable-drag { box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.1), 0 10px 10px -5px rgba(0, 0, 0, 0.04); }
    
    @keyframes gentlePop {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.03); }
    }
    .animate-celebrate {
      animation: gentlePop 0.5s ease-in-out;
    }
  </style>
</head>
<body class="bg-gradient-to-br from-slate-50 via-white to-slate-100 font-sans text-slate-900 antialiased overflow-x-hidden selection:bg-emerald-100 min-h-screen" x-data="habitApp">

  <audio id="clickSound" src="https://assets.mixkit.co/active_storage/sfx/2995/2995-preview.mp3" preload="auto"></audio>

  <div class="w-full pb-40">
    <div class="max-w-7xl mx-auto p-6 md:p-10">
      
      <!-- HEADER -->
      <header class="flex flex-col xl:flex-row justify-between items-start xl:items-end mb-12 gap-6">
        <div>
          <div class="flex items-center gap-4">
            <input type="file" x-ref="profileUpload" accept="image/*" class="hidden" @change="handleProfileUpload">
            <div @click="$refs.profileUpload.click()" class="w-14 h-14 rounded-full border border-slate-200 bg-slate-50 overflow-hidden cursor-pointer shadow-sm hover:border-emerald-500 transition-all flex items-center justify-center shrink-0">
              <template x-if="profileImage"><img :src="profileImage" class="w-full h-full object-cover"></template>
              <template x-if="!profileImage"><svg class="h-6 w-6 text-slate-300" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z" /></svg></template>
            </div>
            <div>
              <h1 class="text-4xl font-light tracking-tight text-slate-800">Clean Slate.</h1>
              <p class="text-slate-500 mt-1 font-medium text-sm">
                <span x-text="currentDayString" class="font-bold text-emerald-600"></span> • 
                <span x-text="currentDayHabits.length"></span> active goals
              </p>
            </div>
          </div>
          
          <div class="flex flex-wrap gap-2 mt-6">
            <button @click="openAddModal()" class="text-sm font-medium text-white bg-emerald-600 border border-emerald-700 hover:bg-emerald-700 transition-colors px-5 py-2 rounded-full shadow-sm active:scale-95 tracking-tight">+ Add Habit</button>
            <button @click="isEditing = !isEditing" :class="isEditing ? 'bg-emerald-50 text-emerald-700 border-emerald-200 shadow-inner' : 'bg-white text-slate-600 border-slate-200 shadow-sm'" class="text-sm font-medium border transition-all px-5 py-2 rounded-full w-24 active:scale-95">
              <span x-text="isEditing ? 'Done' : 'Edit'"></span>
            </button>
            <button @click="isStatsModalOpen = true" class="text-sm font-medium bg-slate-800 text-white border border-slate-900 hover:bg-slate-700 transition-colors px-5 py-2 rounded-full shadow-sm flex items-center gap-2 active:scale-95">
              <svg class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path d="M9 19v-6a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2a2 2 0 002-2zM0 0V9a2 2 0 012-2h2a2 2 0 012 2v10m-6 0a2 2 0 002 2h2a2 2 0 002-2m0 0V5a2 2 0 012-2h2a2 2 0 012 2v14a2 2 0 01-2 2h-2a2 2 0 01-2-2z"/></svg> Stats
            </button>
          </div>
        </div>

        <!-- HEALTH SYNC PANEL -->
        <div class="w-full md:w-64 bg-white p-4 rounded-2xl shadow-sm border border-slate-200 flex flex-col justify-between">
          <div class="flex justify-between items-center mb-3">
            <span class="text-[10px] uppercase tracking-widest text-slate-400 font-bold flex items-center gap-1">
              <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4 text-emerald-400" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z" /></svg> Health Sync
            </span>
          </div>
          <div class="space-y-2.5">
            <div>
              <div class="flex justify-between text-[10px] font-bold mb-1"><span class="text-rose-400">CALORIES</span><span class="text-slate-500"><span x-text="healthData.calories"></span> / <span x-text="healthData.goalCalories"></span></span></div>
              <div class="w-full h-1.5 bg-slate-100 rounded-full overflow-hidden"><div class="h-full bg-rose-400 rounded-full transition-all" :style="`width: ${Math.min((healthData.calories / healthData.goalCalories) * 100, 100)}%`"></div></div>
            </div>
            <div>
              <div class="flex justify-between text-[10px] font-bold mb-1"><span class="text-emerald-400">EXERCISE</span><span class="text-slate-500"><span x-text="healthData.exercise"></span> / <span x-text="healthData.goalExercise"></span> m</span></div>
              <div class="w-full h-1.5 bg-slate-100 rounded-full overflow-hidden"><div class="h-full bg-emerald-400 rounded-full transition-all" :style="`width: ${Math.min((healthData.exercise / healthData.goalExercise) * 100, 100)}%`"></div></div>
            </div>
            <div>
              <div class="flex justify-between text-[10px] font-bold mb-1"><span class="text-cyan-400">SLEEP</span><span class="text-slate-500"><span x-text="healthData.sleep"></span> / <span x-text="healthData.goalSleep"></span> h</span></div>
              <div class="w-full h-1.5 bg-slate-100 rounded-full overflow-hidden"><div class="h-full bg-cyan-400 rounded-full transition-all" :style="`width: ${Math.min((healthData.sleep / healthData.goalSleep) * 100, 100)}%`"></div></div>
            </div>
          </div>
        </div>
      </header>

      <!-- === TODAY SECTION === -->
      <section class="mb-16">
        <h2 class="text-2xl font-light mb-8 text-slate-800 border-b border-slate-200 pb-2">Today</h2>
        <div class="grid grid-cols-1 md:grid-cols-4 gap-6">
          <template x-for="timeBlock in ['morning', 'afternoon', 'evening', 'day']" :key="timeBlock">
            <div :class="sectionProgress('daily', timeBlock) === 100 && combinedHabits.filter(h => h.timeframe === 'daily' && h.timeOfDay === timeBlock).length > 0 ? 'animate-celebrate' : ''">
              
              <div class="mb-4">
                <h3 class="text-xs uppercase tracking-widest text-slate-500 font-bold flex justify-between items-end">
                  <span x-text="timeBlock === 'day' ? 'Anytime' : timeBlock"></span>
                  <span class="text-[9px] text-slate-400 font-normal" x-text="sectionProgress('daily', timeBlock) + '%'"></span>
                </h3>
                <div class="w-full h-1 bg-slate-100 rounded-full overflow-hidden mt-1">
                  <div class="h-full bg-emerald-400 transition-all duration-700" :style="'width: ' + sectionProgress('daily', timeBlock) + '%'"></div>
                </div>
              </div>
              
              <div :id="'list-' + timeBlock" :data-time="timeBlock" class="min-h-[100px] space-y-3">
                <template x-for="habit in combinedHabits.filter(h => h.timeframe === 'daily' && h.timeOfDay === timeBlock && h.days.includes(currentDayString))" :key="habit.id">
                  
                  <!-- HABIT TILE -->
                  <div :data-id="habit.id" 
                       x-data="{ showLog: false, logVal: '', isCustom: false }"
                       :class="[
                          isEditing && !habit.isWatch ? 'border-emerald-300 border-dashed bg-white' : 'border-slate-200 bg-white shadow-sm hover:shadow-md',
                          habit.isWatch ? 'border-slate-200 bg-slate-50/50' : ''
                       ]"
                       class="relative overflow-hidden border rounded-xl transition-all duration-300 group">
                    
                    <!-- Bottom-to-Top Progressive Background Fill -->
                    <div class="absolute bottom-0 left-0 w-full bg-gradient-to-t from-emerald-600 via-emerald-300 to-slate-100 transition-all duration-700 ease-in-out z-0 opacity-80"
                         :style="`height: ${Math.min(((habit.progress || 0) / getSmartTarget(habit.target)) * 100, 100)}%`"></div>

                    <div class="relative z-10 p-4">
                      <div class="flex items-center gap-2">
                        
                        <!-- Drag Handle -->
                        <div x-show="!isEditing" class="drag-handle text-slate-300 hover:text-slate-500 cursor-grab active:cursor-grabbing p-1 -ml-2 shrink-0">
                          <svg class="w-4 h-4" fill="currentColor" viewBox="0 0 24 24"><path d="M8 6a2 2 0 1 1-4 0 2 2 0 0 1 4 0zM8 12a2 2 0 1 1-4 0 2 2 0 0 1 4 0zM8 18a2 2 0 1 1-4 0 2 2 0 0 1 4 0zM20 6a2 2 0 1 1-4 0 2 2 0 0 1 4 0zM20 12a2 2 0 1 1-4 0 2 2 0 0 1 4 0zM20 18a2 2 0 1 1-4 0 2 2 0 0 1 4 0z"/></svg>
                        </div>

                        <!-- Content & Action Body -->
                        <div class="flex-1 min-w-0 cursor-pointer" @click="if(!isEditing && !habit.isWatch) { if(habit.goalType === 'checkoff') quickComplete(habit); else { showLog = !showLog; isCustom = true; } }">
                          <div class="flex items-center gap-1.5 mb-0.5">
                            <span class="text-sm" x-text="habit.isWatch ? '⌚' : categoryIcons[habit.category]"></span>
                            <p :class="(habit.progress || 0) >= getSmartTarget(habit.target) ? 'text-emerald-900' : 'text-slate-400'" class="text-[9px] uppercase tracking-widest font-bold truncate transition-colors duration-500" x-text="habit.category"></p>
                          </div>
                          <div class="flex justify-between items-center">
                            <h2 :class="(habit.progress || 0) >= getSmartTarget(habit.target) && !isEditing ? 'text-emerald-900 font-bold opacity-90' : 'text-slate-800'" 
                                class="text-base font-semibold transition-colors duration-500 truncate" 
                                x-text="habit.title"></h2>
                            
                            <!-- Hide the 1/1 counter if it's a Checkoff goal -->
                            <span x-show="habit.goalType !== 'checkoff'" 
                                  :class="(habit.progress || 0) >= getSmartTarget(habit.target) ? 'text-emerald-900 font-bold' : 'text-slate-500'" 
                                  class="text-xs font-medium shrink-0 ml-2 transition-colors duration-500">
                              <span x-text="habit.progress || 0"></span> / <span x-text="getSmartTarget(habit.target)"></span>
                              <span x-text="habit.goalType === 'duration' ? 'm' : ''" class="text-[9px]"></span>
                            </span>
                          </div>
                        </div>

                        <!-- Actions (Edit/Quick Log) -->
                        <div class="shrink-0 flex items-center relative z-20">
                          <template x-if="!isEditing && !habit.isWatch && (habit.progress || 0) < getSmartTarget(habit.target) && habit.goalType !== 'checkoff'">
                            <button @click.stop="showLog = !showLog; isCustom = false;" class="ml-2 text-xs border border-slate-200 bg-white/90 rounded px-2 py-1 text-slate-500 hover:bg-white shadow-sm transition-all">Log</button>
                          </template>
                          
                          <template x-if="isEditing && !habit.isWatch">
                            <div class="flex gap-2 ml-2 bg-white/80 rounded px-2 py-1 backdrop-blur-sm">
                              <button @click.stop="openEditModal(habit)" class="text-slate-400 hover:text-slate-800"><svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path d="M15.232 5.232l3.536 3.536m-2.036-5.036a2.5 2.5 0 113.536 3.536L6.5 21.036H3v-3.572L16.732 3.732z"/></svg></button>
                              <button @click.stop="deleteHabitGroup(habit.title)" class="text-red-400 hover:text-red-600 font-bold">&times;</button>
                            </div>
                          </template>
                        </div>
                      </div>

                      <!-- Log Dropdown / Input -->
                      <div x-show="showLog" x-cloak x-collapse class="mt-3 pt-3 border-t border-slate-200/50 relative z-20">
                        <template x-if="!isCustom">
                          <select x-model="logVal" 
                                  @change="if(logVal==='custom'){ isCustom=true; logVal=''; } else if(logVal){ logTime(habit, parseInt(logVal)); showLog=false; logVal=''; }" 
                                  class="w-full bg-white/90 border border-slate-200 rounded p-1.5 text-sm text-slate-600 outline-none shadow-sm backdrop-blur-sm cursor-pointer">
                            <option value="">Select quick time...</option>
                            <template x-for="i in 24"><option :value="i*5" x-text="(i*5) + ' mins'"></option></template>
                            <option value="custom">Custom...</option>
                          </select>
                        </template>
                        <template x-if="isCustom">
                          <form @submit.prevent="if(logVal){ logTime(habit, parseInt(logVal)); showLog=false; isCustom=false; logVal=''; }" class="flex gap-2">
                            <input type="number" x-model="logVal" placeholder="Amount to log..." class="w-full border border-slate-200 rounded p-1.5 text-sm bg-white/90 outline-none shadow-sm backdrop-blur-sm" autofocus>
                            <button type="submit" class="bg-emerald-600 text-white px-3 py-1.5 rounded text-sm font-medium hover:bg-emerald-700 shadow-sm">Save</button>
                          </form>
                        </template>
                      </div>

                    </div>
                  </div>
                  <!-- END HABIT TILE -->

                </template>
                <div x-show="combinedHabits.filter(h => h.timeframe === 'daily' && h.timeOfDay === timeBlock && h.days.includes(currentDayString)).length === 0" class="text-xs text-slate-400 italic text-center py-2">No tasks</div>
              </div>
            </div>
          </template>
        </div>
      </section>

      <hr class="my-12 border-slate-200" />

      <!-- === WEEKLY SECTION === -->
      <section class="text-center flex flex-col items-center mb-12">
        <h2 class="text-2xl font-light mb-6 text-slate-800 tracking-tight">This Week</h2>
        <div class="w-full max-w-md flex flex-col gap-3" :class="sectionProgress('weekly', 'none') === 100 && combinedHabits.filter(h => h.timeframe === 'weekly').length > 0 ? 'animate-celebrate' : ''">
          <template x-for="habit in combinedHabits.filter(h => h.timeframe === 'weekly')" :key="habit.id">
            <div :data-id="habit.id" x-data="{ showLog: false, logVal: '', isCustom: false }" class="relative overflow-hidden border rounded-xl text-left bg-white shadow-sm transition-all duration-300">
              <div class="absolute bottom-0 left-0 w-full bg-gradient-to-t from-emerald-600 via-emerald-300 to-slate-100 transition-all duration-700 ease-in-out z-0 opacity-80" :style="`height: ${Math.min(((habit.progress || 0) / getSmartTarget(habit.target)) * 100, 100)}%`"></div>
              <div class="relative z-10 p-4">
                <div class="flex items-center gap-2">
                  <div class="flex-1 min-w-0 cursor-pointer" @click="if(!isEditing) { if(habit.goalType === 'checkoff') quickComplete(habit); else { showLog = !showLog; isCustom = true; } }">
                    <div class="flex justify-between items-center">
                      <h2 :class="(habit.progress || 0) >= getSmartTarget(habit.target) && !isEditing ? 'text-emerald-900 font-bold opacity-90' : 'text-slate-800'" class="text-base font-semibold truncate transition-colors duration-500" x-text="habit.title"></h2>
                      <span x-show="habit.goalType !== 'checkoff'" :class="(habit.progress || 0) >= getSmartTarget(habit.target) ? 'text-emerald-900 font-bold' : 'text-slate-500'" class="text-xs font-medium shrink-0 ml-2 transition-colors duration-500">
                        <span x-text="habit.progress || 0"></span> / <span x-text="getSmartTarget(habit.target)"></span>
                      </span>
                    </div>
                  </div>
                  <div class="shrink-0 flex items-center relative z-20">
                    <template x-if="!isEditing && (habit.progress || 0) < getSmartTarget(habit.target) && habit.goalType !== 'checkoff'">
                      <button @click.stop="showLog = !showLog; isCustom = false;" class="ml-2 text-xs border border-slate-200 bg-white/90 rounded px-2 py-1 text-slate-500 shadow-sm hover:bg-white transition-all">Log</button>
                    </template>
                    <template x-if="isEditing"><button @click.stop="deleteHabitGroup(habit.title)" class="text-red-400 font-bold ml-3 bg-white/80 px-2 py-1 rounded backdrop-blur-sm">&times;</button></template>
                  </div>
                </div>
                <!-- Log Dropdown -->
                <div x-show="showLog" x-cloak x-collapse class="mt-3 pt-3 border-t border-slate-200/50 relative z-20">
                  <template x-if="!isCustom">
                    <select x-model="logVal" @change="if(logVal==='custom'){ isCustom=true; logVal=''; } else if(logVal){ logTime(habit, parseInt(logVal)); showLog=false; logVal=''; }" class="w-full bg-white/90 border border-slate-200 rounded p-1.5 text-sm outline-none shadow-sm backdrop-blur-sm cursor-pointer">
                      <option value="">Select quick time...</option>
                      <template x-for="i in 24"><option :value="i*5" x-text="(i*5) + ' mins'"></option></template>
                      <option value="custom">Custom...</option>
                    </select>
                  </template>
                  <template x-if="isCustom">
                    <form @submit.prevent="if(logVal){ logTime(habit, parseInt(logVal)); showLog=false; isCustom=false; logVal=''; }" class="flex gap-2">
                      <input type="number" x-model="logVal" placeholder="Amount to log..." class="w-full border border-slate-200 rounded p-1.5 text-sm outline-none bg-white/90 shadow-sm backdrop-blur-sm" autofocus>
                      <button type="submit" class="bg-emerald-600 text-white px-3 py-1.5 rounded text-sm shadow-sm hover:bg-emerald-700">Save</button>
                    </form>
                  </template>
                </div>
              </div>
            </div>
          </template>
          <div x-show="combinedHabits.filter(h => h.timeframe === 'weekly').length === 0" class="text-xs text-slate-400 italic py-2">No weekly tasks</div>
        </div>
      </section>

      <hr class="my-12 border-slate-200" />

      <!-- === MONTHLY SECTION === -->
      <section class="text-center flex flex-col items-center mb-12">
        <h2 class="text-2xl font-light mb-6 text-slate-800 tracking-tight">This Month</h2>
        <div class="w-full max-w-md flex flex-col gap-3" :class="sectionProgress('monthly', 'none') === 100 && combinedHabits.filter(h => h.timeframe === 'monthly').length > 0 ? 'animate-celebrate' : ''">
          <template x-for="habit in combinedHabits.filter(h => h.timeframe === 'monthly')" :key="habit.id">
            <div :data-id="habit.id" x-data="{ showLog: false, logVal: '', isCustom: false }" class="relative overflow-hidden border rounded-xl text-left bg-white shadow-sm transition-all duration-300">
              <div class="absolute bottom-0 left-0 w-full bg-gradient-to-t from-emerald-600 via-emerald-300 to-slate-100 transition-all duration-700 ease-in-out z-0 opacity-80" :style="`height: ${Math.min(((habit.progress || 0) / getSmartTarget(habit.target)) * 100, 100)}%`"></div>
              <div class="relative z-10 p-4">
                <div class="flex items-center gap-2">
                  <div class="flex-1 min-w-0 cursor-pointer" @click="if(!isEditing) { if(habit.goalType === 'checkoff') quickComplete(habit); else { showLog = !showLog; isCustom = true; } }">
                    <div class="flex justify-between items-center">
                      <h2 :class="(habit.progress || 0) >= getSmartTarget(habit.target) && !isEditing ? 'text-emerald-900 font-bold opacity-90' : 'text-slate-800'" class="text-base font-semibold truncate transition-colors duration-500" x-text="habit.title"></h2>
                      <span x-show="habit.goalType !== 'checkoff'" :class="(habit.progress || 0) >= getSmartTarget(habit.target) ? 'text-emerald-900 font-bold' : 'text-slate-500'" class="text-xs font-medium shrink-0 ml-2 transition-colors duration-500">
                        <span x-text="habit.progress || 0"></span> / <span x-text="getSmartTarget(habit.target)"></span>
                      </span>
                    </div>
                  </div>
                  <div class="shrink-0 flex items-center relative z-20">
                    <template x-if="!isEditing && (habit.progress || 0) < getSmartTarget(habit.target) && habit.goalType !== 'checkoff'">
                      <button @click.stop="showLog = !showLog; isCustom = false;" class="ml-2 text-xs border border-slate-200 bg-white/90 rounded px-2 py-1 text-slate-500 shadow-sm hover:bg-white transition-all">Log</button>
                    </template>
                    <template x-if="isEditing"><button @click.stop="deleteHabitGroup(habit.title)" class="text-red-400 font-bold ml-3 bg-white/80 px-2 py-1 rounded backdrop-blur-sm">&times;</button></template>
                  </div>
                </div>
                <!-- Log Dropdown -->
                <div x-show="showLog" x-cloak x-collapse class="mt-3 pt-3 border-t border-slate-200/50 relative z-20">
                  <template x-if="!isCustom">
                    <select x-model="logVal" @change="if(logVal==='custom'){ isCustom=true; logVal=''; } else if(logVal){ logTime(habit, parseInt(logVal)); showLog=false; logVal=''; }" class="w-full bg-white/90 border border-slate-200 rounded p-1.5 text-sm outline-none shadow-sm backdrop-blur-sm cursor-pointer">
                      <option value="">Select quick time...</option>
                      <template x-for="i in 24"><option :value="i*5" x-text="(i*5) + ' mins'"></option></template>
                      <option value="custom">Custom...</option>
                    </select>
                  </template>
                  <template x-if="isCustom">
                    <form @submit.prevent="if(logVal){ logTime(habit, parseInt(logVal)); showLog=false; isCustom=false; logVal=''; }" class="flex gap-2">
                      <input type="number" x-model="logVal" placeholder="Amount to log..." class="w-full border border-slate-200 rounded p-1.5 text-sm outline-none bg-white/90 shadow-sm backdrop-blur-sm" autofocus>
                      <button type="submit" class="bg-emerald-600 text-white px-3 py-1.5 rounded text-sm shadow-sm hover:bg-emerald-700">Save</button>
                    </form>
                  </template>
                </div>
              </div>
            </div>
          </template>
          <div x-show="combinedHabits.filter(h => h.timeframe === 'monthly').length === 0" class="text-xs text-slate-400 italic py-2">No monthly tasks</div>
        </div>
      </section>

      <hr class="my-12 border-slate-200" />

      <!-- === YEARLY SECTION === -->
      <section class="text-center flex flex-col items-center mb-12">
        <h2 class="text-2xl font-light mb-6 text-slate-800 tracking-tight">This Year</h2>
        <div class="w-full max-w-md flex flex-col gap-3" :class="sectionProgress('yearly', 'none') === 100 && combinedHabits.filter(h => h.timeframe === 'yearly').length > 0 ? 'animate-celebrate' : ''">
          <template x-for="habit in combinedHabits.filter(h => h.timeframe === 'yearly')" :key="habit.id">
            <div :data-id="habit.id" x-data="{ showLog: false, logVal: '', isCustom: false }" class="relative overflow-hidden border rounded-xl text-left bg-white shadow-sm transition-all duration-300">
              <div class="absolute bottom-0 left-0 w-full bg-gradient-to-t from-emerald-600 via-emerald-300 to-slate-100 transition-all duration-700 ease-in-out z-0 opacity-80" :style="`height: ${Math.min(((habit.progress || 0) / getSmartTarget(habit.target)) * 100, 100)}%`"></div>
              <div class="relative z-10 p-4">
                <div class="flex items-center gap-2">
                  <div class="flex-1 min-w-0 cursor-pointer" @click="if(!isEditing) { if(habit.goalType === 'checkoff') quickComplete(habit); else { showLog = !showLog; isCustom = true; } }">
                    <div class="flex justify-between items-center">
                      <h2 :class="(habit.progress || 0) >= getSmartTarget(habit.target) && !isEditing ? 'text-emerald-900 font-bold opacity-90' : 'text-slate-800'" class="text-base font-semibold truncate transition-colors duration-500" x-text="habit.title"></h2>
                      <span x-show="habit.goalType !== 'checkoff'" :class="(habit.progress || 0) >= getSmartTarget(habit.target) ? 'text-emerald-900 font-bold' : 'text-slate-500'" class="text-xs font-medium shrink-0 ml-2 transition-colors duration-500">
                        <span x-text="habit.progress || 0"></span> / <span x-text="getSmartTarget(habit.target)"></span>
                      </span>
                    </div>
                  </div>
                  <div class="shrink-0 flex items-center relative z-20">
                    <template x-if="!isEditing && (habit.progress || 0) < getSmartTarget(habit.target) && habit.goalType !== 'checkoff'">
                      <button @click.stop="showLog = !showLog; isCustom = false;" class="ml-2 text-xs border border-slate-200 bg-white/90 rounded px-2 py-1 text-slate-500 shadow-sm hover:bg-white transition-all">Log</button>
                    </template>
                    <template x-if="isEditing"><button @click.stop="deleteHabitGroup(habit.title)" class="text-red-400 font-bold ml-3 bg-white/80 px-2 py-1 rounded backdrop-blur-sm">&times;</button></template>
                  </div>
                </div>
                <!-- Log Dropdown -->
                <div x-show="showLog" x-cloak x-collapse class="mt-3 pt-3 border-t border-slate-200/50 relative z-20">
                  <template x-if="!isCustom">
                    <select x-model="logVal" @change="if(logVal==='custom'){ isCustom=true; logVal=''; } else if(logVal){ logTime(habit, parseInt(logVal)); showLog=false; logVal=''; }" class="w-full bg-white/90 border border-slate-200 rounded p-1.5 text-sm outline-none shadow-sm backdrop-blur-sm cursor-pointer">
                      <option value="">Select quick time...</option>
                      <template x-for="i in 24"><option :value="i*5" x-text="(i*5) + ' mins'"></option></template>
                      <option value="custom">Custom...</option>
                    </select>
                  </template>
                  <template x-if="isCustom">
                    <form @submit.prevent="if(logVal){ logTime(habit, parseInt(logVal)); showLog=false; isCustom=false; logVal=''; }" class="flex gap-2">
                      <input type="number" x-model="logVal" placeholder="Amount to log..." class="w-full border border-slate-200 rounded p-1.5 text-sm outline-none bg-white/90 shadow-sm backdrop-blur-sm" autofocus>
                      <button type="submit" class="bg-emerald-600 text-white px-3 py-1.5 rounded text-sm shadow-sm hover:bg-emerald-700">Save</button>
                    </form>
                  </template>
                </div>
              </div>
            </div>
          </template>
          <div x-show="combinedHabits.filter(h => h.timeframe === 'yearly').length === 0" class="text-xs text-slate-400 italic py-2">No yearly tasks</div>
        </div>
      </section>

    </div>
  </div>

  <!-- STATS MODAL -->
  <div x-show="isStatsModalOpen" x-cloak x-transition.opacity class="fixed inset-0 z-50 flex items-center justify-center bg-slate-900/70 backdrop-blur-sm p-4 overflow-y-auto">
    <div @click.away="isStatsModalOpen = false" class="bg-white rounded-3xl p-8 w-full max-w-md shadow-2xl my-8">
      <div class="flex justify-between items-center mb-6 border-b border-slate-100 pb-4">
        <h3 class="text-2xl font-bold text-slate-800">Your Stats</h3>
        <button @click="isStatsModalOpen = false" class="text-slate-400 hover:text-slate-800 font-bold text-2xl">&times;</button>
      </div>
      
      <div class="space-y-6">
        <!-- Overall completion -->
        <div class="bg-slate-50 border border-slate-200 rounded-2xl p-6 text-center shadow-inner">
          <div class="text-xs uppercase tracking-widest text-slate-500 font-bold mb-1">Overall Completion</div>
          <div class="text-5xl font-light text-emerald-600"><span x-text="habitStats.overall"></span>%</div>
        </div>

        <!-- Top 3 -->
        <div>
          <h4 class="text-xs uppercase tracking-widest text-emerald-600 font-bold mb-3 flex items-center gap-2">
            <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M5 10l7-7m0 0l7 7m-7-7v18" /></svg> Top Performing
          </h4>
          <div class="space-y-2">
            <template x-for="h in habitStats.top3" :key="h.id">
              <div class="flex justify-between items-center bg-white border border-slate-200 rounded-xl p-3 shadow-sm">
                <span class="font-semibold text-slate-700 text-sm truncate pr-4" x-text="h.title + ' (' + h.timeframe + ')'"></span>
                <span class="text-xs font-bold text-emerald-600 bg-emerald-50 border border-emerald-100 px-2 py-1 rounded shrink-0" x-text="Math.round(h.percentage) + '%'"></span>
              </div>
            </template>
            <div x-show="habitStats.top3.length === 0" class="text-xs text-slate-400 italic bg-slate-50 p-3 rounded-xl border border-slate-100">No data yet</div>
          </div>
        </div>

        <!-- Bottom 3 -->
        <div>
          <h4 class="text-xs uppercase tracking-widest text-rose-500 font-bold mb-3 flex items-center gap-2">
             <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M19 14l-7 7m0 0l-7-7m7 7V3" /></svg> Needs Focus
          </h4>
          <div class="space-y-2">
            <template x-for="h in habitStats.bottom3" :key="h.id">
              <div class="flex justify-between items-center bg-white border border-slate-200 rounded-xl p-3 shadow-sm">
                <span class="font-semibold text-slate-700 text-sm truncate pr-4" x-text="h.title + ' (' + h.timeframe + ')'"></span>
                <span class="text-xs font-bold text-rose-500 bg-rose-50 border border-rose-100 px-2 py-1 rounded shrink-0" x-text="Math.round(h.percentage) + '%'"></span>
              </div>
            </template>
            <div x-show="habitStats.bottom3.length === 0" class="text-xs text-slate-400 italic bg-slate-50 p-3 rounded-xl border border-slate-100">No data yet</div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- ADD/EDIT HABIT MODAL -->
  <div x-show="isAddModalOpen" x-cloak x-transition.opacity class="fixed inset-0 z-50 flex items-center justify-center bg-slate-900/70 backdrop-blur-sm p-4 overflow-y-auto">
    <div @click.away="isAddModalOpen = false" class="bg-white rounded-3xl p-8 w-full max-w-md shadow-2xl my-8">
      
      <h3 class="text-2xl font-bold mb-6 text-slate-800 text-center" x-text="editingHabitTitle ? 'Edit Habit' : 'New Habit'"></h3>
      
      <div class="space-y-6">
        
        <!-- Title Input -->
        <input x-model="newHabitForm.title" type="text" placeholder="Morning meditation..." class="w-full bg-slate-50 border border-slate-200 rounded-xl px-5 py-4 text-xl outline-none focus:border-emerald-500 focus:bg-white font-medium text-slate-800 shadow-inner transition-colors">
        
        <!-- Category & Goal Type Dropdowns -->
        <div class="grid grid-cols-2 gap-4">
          <select x-model="newHabitForm.category" class="w-full bg-slate-50 border border-slate-200 rounded-xl px-4 py-3 outline-none focus:border-emerald-500 font-medium text-slate-700">
            <template x-for="cat in Object.keys(categoryIcons)"><option :value="cat" x-text="cat"></option></template>
          </select>
          <select x-model="newHabitForm.goalType" class="w-full bg-slate-50 border border-slate-200 rounded-xl px-4 py-3 outline-none focus:border-emerald-500 font-medium text-slate-700">
            <option value="checkoff">None (Checkoff)</option>
            <option value="duration">Duration (Time)</option>
            <option value="frequency">Frequency (Events)</option>
          </select>
        </div>

        <!-- Timeframes & Goals Stack -->
        <div class="space-y-3 bg-slate-50 border border-slate-200 p-4 rounded-2xl shadow-inner">
          
          <!-- Daily Row -->
          <div class="flex items-center gap-3">
            <input type="checkbox" x-model="newHabitForm.timeframes.daily.active" class="w-5 h-5 text-emerald-600 rounded border-slate-300 focus:ring-emerald-500 shrink-0 cursor-pointer">
            <span class="text-sm font-bold text-slate-700 w-16 shrink-0">Daily</span>
            <select x-show="newHabitForm.timeframes.daily.active" x-model="newHabitForm.timeframes.daily.timeOfDay" class="flex-1 bg-white border border-slate-200 rounded-lg px-3 py-2 text-sm outline-none font-medium">
              <option value="morning">Morning</option>
              <option value="afternoon">Afternoon</option>
              <option value="evening">Evening</option>
              <option value="day">Anytime</option>
            </select>
            <!-- Daily target hidden if checkoff (implicitly 1) -->
            <input x-show="newHabitForm.timeframes.daily.active && newHabitForm.goalType !== 'checkoff'" x-model="newHabitForm.timeframes.daily.target" type="text" placeholder="Amt" class="w-20 bg-white border border-slate-200 rounded-lg px-3 py-2 text-sm outline-none text-center font-medium">
          </div>

          <!-- Weekly Row -->
          <div class="flex items-center gap-3">
            <input type="checkbox" x-model="newHabitForm.timeframes.weekly.active" class="w-5 h-5 text-emerald-600 rounded border-slate-300 focus:ring-emerald-500 shrink-0 cursor-pointer">
            <span class="text-sm font-bold text-slate-700 w-16 shrink-0">Weekly</span>
            <div class="flex-1"></div>
            <!-- Weekly/Monthly/Yearly targets shown for ALL types because you can checkoff multiple times a week -->
            <input x-show="newHabitForm.timeframes.weekly.active" x-model="newHabitForm.timeframes.weekly.target" type="text" placeholder="Amt or 'week'" class="w-28 bg-white border border-slate-200 rounded-lg px-3 py-2 text-sm outline-none text-center font-medium placeholder:text-slate-300">
          </div>

          <!-- Monthly Row -->
          <div class="flex items-center gap-3">
            <input type="checkbox" x-model="newHabitForm.timeframes.monthly.active" class="w-5 h-5 text-emerald-600 rounded border-slate-300 focus:ring-emerald-500 shrink-0 cursor-pointer">
            <span class="text-sm font-bold text-slate-700 w-16 shrink-0">Monthly</span>
            <div class="flex-1"></div>
            <input x-show="newHabitForm.timeframes.monthly.active" x-model="newHabitForm.timeframes.monthly.target" type="text" placeholder="Amt or 'month'" class="w-28 bg-white border border-slate-200 rounded-lg px-3 py-2 text-sm outline-none text-center font-medium placeholder:text-slate-300">
          </div>

          <!-- Yearly Row -->
          <div class="flex items-center gap-3">
            <input type="checkbox" x-model="newHabitForm.timeframes.yearly.active" class="w-5 h-5 text-emerald-600 rounded border-slate-300 focus:ring-emerald-500 shrink-0 cursor-pointer">
            <span class="text-sm font-bold text-slate-700 w-16 shrink-0">Yearly</span>
            <div class="flex-1"></div>
            <input x-show="newHabitForm.timeframes.yearly.active" x-model="newHabitForm.timeframes.yearly.target" type="text" placeholder="Amt or 'year'" class="w-28 bg-white border border-slate-200 rounded-lg px-3 py-2 text-sm outline-none text-center font-medium placeholder:text-slate-300">
          </div>

        </div>

        <!-- Active Days Pills -->
        <div class="flex justify-between gap-2">
          <template x-for="day in daysOfWeek">
            <button @click="toggleDay(day)" 
                    :class="newHabitForm.days.includes(day) ? 'bg-emerald-500 text-white border-emerald-600' : 'bg-white text-slate-400 border-slate-300 hover:bg-slate-50'" 
                    class="flex-1 py-2 text-[10px] font-bold rounded-full border uppercase transition-colors shadow-sm" 
                    x-text="day"></button>
          </template>
        </div>

      </div>
      
      <!-- Action Buttons -->
      <div class="mt-10 flex gap-4">
        <button @click="isAddModalOpen = false" class="flex-1 bg-white border-2 border-slate-200 text-slate-600 font-bold py-3.5 rounded-xl active:scale-95 text-base hover:bg-slate-50 transition-colors">Cancel</button>
        <button @click="saveHabit()" class="flex-1 bg-emerald-500 border border-emerald-600 text-white font-bold py-3.5 rounded-xl shadow-md active:scale-95 text-base hover:bg-emerald-600 transition-colors">Save Habit</button>
      </div>

    </div>
  </div>

  <script>
    document.addEventListener('alpine:init', () => {
      Alpine.data('habitApp', () => ({
        isEditing: false, 
        isAddModalOpen: false,
        isStatsModalOpen: false, 
        editingHabitTitle: null,
        daysOfWeek: ['Mon', 'Tue', 'Wed', 'Thu', 'Fri', 'Sat', 'Sun'],
        currentDayString: new Date().toLocaleDateString('en-US', { weekday: 'short' }),
        profileImage: Alpine.$persist(null),
        categoryIcons: { 'Faith': '🕊️', 'Family': '👨‍👩‍👧', 'Friends/Others': '🤝', 'Health/Sleep': '🏃', 'Work': '💼', 'Home': '🏠', 'Leisure': '📖', 'Health/Sync': '❤️' },
        
        habits: Alpine.$persist([
          { id: 1, title: 'Read', timeframe: 'daily', timeOfDay: 'morning', category: 'Leisure', goalType: 'duration', target: 20, progress: 0, order: 0, days: ['Mon', 'Tue', 'Wed', 'Thu', 'Fri', 'Sat', 'Sun'] },
          { id: 2, title: 'Read', timeframe: 'weekly', timeOfDay: 'none', category: 'Leisure', goalType: 'duration', target: 140, progress: 0, order: 1, days: ['Mon', 'Tue', 'Wed', 'Thu', 'Fri', 'Sat', 'Sun'] }
        ]),
        
        newHabitForm: {
          title: '', category: 'Health/Sleep', goalType: 'checkoff', days: [],
          timeframes: {
            daily: { active: true, timeOfDay: 'day', target: '' },
            weekly: { active: false, target: '' },
            monthly: { active: false, target: '' },
            yearly: { active: false, target: '' }
          }
        },

        healthPrefs: Alpine.$persist({ h_move: { timeOfDay: 'day', order: -3 }, h_ex: { timeOfDay: 'day', order: -2 }, h_sleep: { timeOfDay: 'morning', order: -1 } }),
        healthData: { calories: 0, goalCalories: 2500, exercise: 0, goalExercise: 30, sleep: 0, goalSleep: 7.5 },
        lastOpenedDate: Alpine.$persist(new Date().toDateString()),

        async fetchHealthData() {
          const supabaseUrl = 'https://vzkkjpaqteiqyomwalzr.supabase.co'; 
          const anonKey = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InZ6a2tqcGFxdGVpcXlvbXdhbHpyIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzgzNjIwNjAsImV4cCI6MjA5MzkzODA2MH0.xu0nctOWwIPWQ5E-MzypSLOhhZmsIj-Np5o992tXN_Q'; 
          const now = new Date();
          const offset = now.getTimezoneOffset();
          const localDate = new Date(now.getTime() - (offset * 60 * 1000));
          const dateString = localDate.toISOString().split('T')[0];
          try {
            const res = await fetch(`${supabaseUrl}/rest/v1/health_metrics?date=eq.${dateString}&select=*`, {
              headers: { 'apikey': anonKey, 'Authorization': `Bearer ${anonKey}` }
            });
            const data = await res.json();
            if (data?.length > 0) {
              const d = data[data.length-1];
              this.healthData.calories = d.calories || 0;
              this.healthData.exercise = d.exercise || 0;
              this.healthData.sleep = d.sleep ? Math.round(d.sleep * 10) / 10 : 0; 
            }
          } catch (e) {}
        },

        init() {
          const today = new Date().toDateString();
          if (this.lastOpenedDate !== today) { 
            this.habits.forEach(h => { if(h.timeframe === 'daily') h.progress = 0; }); 
            this.lastOpenedDate = today; 
          }
          this.fetchHealthData();
          this.$nextTick(() => { this.setupSortable(); });
        },

        setupSortable() {
          ['day', 'morning', 'afternoon', 'evening'].forEach(block => {
            const el = document.getElementById('list-' + block);
            if(el) {
              new Sortable(el, {
                group: 'shared', handle: '.drag-handle', animation: 150, onEnd: (evt) => {
                  const id = evt.item.dataset.id;
                  const newTime = evt.to.dataset.time;
                  const newOrders = {};
                  Array.from(evt.to.children).forEach((el, index) => { newOrders[el.dataset.id] = index; });
                  
                  if (id.startsWith('h_')) { this.healthPrefs[id].timeOfDay = newTime; } 
                  else { const h = this.habits.find(h => h.id == id); if(h) h.timeOfDay = newTime; }
                  
                  this.habits.forEach(h => { if (newOrders[h.id] !== undefined) h.order = newOrders[h.id]; });
                  Object.keys(this.healthPrefs).forEach(key => { if (newOrders[key] !== undefined) this.healthPrefs[key].order = newOrders[key]; });
                  
                  this.habits = [...this.habits];
                  this.healthPrefs = {...this.healthPrefs};
                }
              });
            }
          });
        },

        handleProfileUpload(event) {
          const file = event.target.files[0]; if(!file) return;
          const reader = new FileReader(); reader.onload = (e) => { this.profileImage = e.target.result; }; reader.readAsDataURL(file);
        },

        getSmartTarget(targetStr) {
          if (!targetStr) return 0;
          if (typeof targetStr === 'number') return targetStr;
          const s = targetStr.toString().toLowerCase().trim();
          const d = new Date();
          if (s === 'week') return 7;
          if (s === 'month') return new Date(d.getFullYear(), d.getMonth() + 1, 0).getDate();
          if (s === 'year') { 
            const y = d.getFullYear(); 
            const isLeap = (y % 4 === 0 && y % 100 !== 0) || y % 400 === 0;
            return isLeap ? 366 : 365; 
          }
          return parseInt(s) || 0;
        },

        logTime(habit, amount) {
          if (!amount || isNaN(amount)) return;
          const groupTitle = habit.title.toLowerCase().trim();
          
          this.habits = this.habits.map(h => {
            if (h.title.toLowerCase().trim() === groupTitle) {
              const newProgress = Math.max(0, (h.progress || 0) + amount);
              return { ...h, progress: newProgress };
            }
            return h;
          });
          
          if (amount > 0) {
             document.getElementById('clickSound').cloneNode().play();
          }
        },

        quickComplete(habit) {
          const target = this.getSmartTarget(habit.target);
          const current = habit.progress || 0;
          const isComplete = current >= target;
          
          let increment = 0;

          if (isComplete) {
            if (habit.goalType === 'duration') {
                increment = -target;
            } else {
                increment = -1;
            }
          } else {
            if (habit.goalType === 'duration') {
                increment = target - current;
            } else {
                increment = 1;
            }
          }
          
          this.logTime(habit, increment);
        },

        get combinedHabits() {
          const tiles = [
            { id: 'h_move', title: `Hit Calories`, timeframe: 'daily', timeOfDay: this.healthPrefs.h_move.timeOfDay, category: 'Health/Sync', goalType: 'duration', target: this.healthData.goalCalories, progress: this.healthData.calories, isWatch: true, order: this.healthPrefs.h_move.order, days: this.daysOfWeek },
            { id: 'h_ex', title: `Close Exercise`, timeframe: 'daily', timeOfDay: this.healthPrefs.h_ex.timeOfDay, category: 'Health/Sync', goalType: 'duration', target: this.healthData.goalExercise, progress: this.healthData.exercise, isWatch: true, order: this.healthPrefs.h_ex.order, days: this.daysOfWeek },
            { id: 'h_sleep', title: `Hit Sleep Target`, timeframe: 'daily', timeOfDay: this.healthPrefs.h_sleep.timeOfDay, category: 'Health/Sync', goalType: 'duration', target: this.healthData.goalSleep, progress: this.healthData.sleep, isWatch: true, order: this.healthPrefs.h_sleep.order, days: this.daysOfWeek }
          ];
          return [...tiles, ...this.habits].sort((a, b) => (a.order || 0) - (b.order || 0));
        },

        get currentDayHabits() { 
          return this.combinedHabits.filter(h => h.timeframe === 'daily' && h.days.includes(this.currentDayString)); 
        },

        sectionProgress(timeframe, timeOfDay) {
          let items;
          if (timeframe === 'daily') {
            items = this.currentDayHabits.filter(h => h.timeOfDay === timeOfDay);
          } else {
            items = this.combinedHabits.filter(h => h.timeframe === timeframe);
          }
          
          if(items.length === 0) return 0;
          
          let totalTarget = 0;
          let totalProgress = 0;
          
          items.forEach(h => {
            const t = this.getSmartTarget(h.target);
            totalTarget += t;
            totalProgress += Math.min((h.progress || 0), t); 
          });
          
          if(totalTarget === 0) return 0;
          return Math.round((totalProgress / totalTarget) * 100);
        },

        get habitStats() {
          const activeHabits = this.habits.filter(h => this.getSmartTarget(h.target) > 0);
          
          const mapped = activeHabits.map(h => {
            const target = this.getSmartTarget(h.target) || 1;
            const progress = h.progress || 0;
            const percentage = Math.min((progress / target) * 100, 100);
            return { ...h, percentage, target, progress };
          });
          
          const sortedDesc = [...mapped].sort((a, b) => b.percentage - a.percentage);
          const top3 = sortedDesc.filter(h => h.percentage > 0).slice(0, 3);
          
          const sortedAsc = [...mapped].sort((a, b) => a.percentage - b.percentage);
          const bottom3 = sortedAsc.filter(h => h.percentage < 100).slice(0, 3);
          
          const totalTarget = mapped.reduce((sum, h) => sum + h.target, 0);
          const totalProgress = mapped.reduce((sum, h) => sum + h.progress, 0);
          const overall = totalTarget > 0 ? Math.round((totalProgress / totalTarget) * 100) : 0;
          
          return { top3, bottom3, overall };
        },

        deleteHabitGroup(title) { 
           this.habits = this.habits.filter(h => h.title.toLowerCase().trim() !== title.toLowerCase().trim()); 
        },

        toggleDay(d) { 
           if (this.newHabitForm.days.includes(d)) { 
              this.newHabitForm.days = this.newHabitForm.days.filter(x => x !== d); 
           } else { 
              this.newHabitForm.days.push(d); 
           } 
        },
        
        openAddModal() { 
          this.editingHabitTitle = null; 
          this.newHabitForm = { 
            title: '', category: 'Health/Sleep', goalType: 'checkoff', days: [...this.daysOfWeek],
            timeframes: {
               daily: { active: true, timeOfDay: 'day', target: '' },
               weekly: { active: false, target: '' },
               monthly: { active: false, target: '' },
               yearly: { active: false, target: '' }
            }
          }; 
          this.isAddModalOpen = true; 
        },
        
        openEditModal(h) { 
          this.editingHabitTitle = h.title.toLowerCase().trim();
          
          const group = this.habits.filter(item => item.title.toLowerCase().trim() === this.editingHabitTitle);
          const base = group[0];
          
          this.newHabitForm = { 
            title: base.title, 
            category: base.category || 'Health/Sleep', 
            goalType: base.goalType || 'checkoff', 
            days: base.days ? [...base.days] : [...this.daysOfWeek],
            timeframes: {
               daily: { active: false, timeOfDay: 'day', target: '' },
               weekly: { active: false, target: '' },
               monthly: { active: false, target: '' },
               yearly: { active: false, target: '' }
            }
          };
          
          group.forEach(item => {
             if (this.newHabitForm.timeframes[item.timeframe]) {
                this.newHabitForm.timeframes[item.timeframe].active = true;
                this.newHabitForm.timeframes[item.timeframe].target = item.target;
                if (item.timeframe === 'daily') {
                   this.newHabitForm.timeframes.daily.timeOfDay = item.timeOfDay || 'day';
                }
             }
          });

          this.isAddModalOpen = true; 
        },

        saveHabit() {
          const form = this.newHabitForm;
          if (!form.title.trim()) return;
          
          const groupTitle = form.title.toLowerCase().trim();
          
          let oldProgressMap = {};
          if (this.editingHabitTitle) {
             const oldHabits = this.habits.filter(h => h.title.toLowerCase().trim() === this.editingHabitTitle);
             oldHabits.forEach(h => { oldProgressMap[h.timeframe] = h.progress; });
             this.deleteHabitGroup(this.editingHabitTitle);
          }
          
          Object.keys(form.timeframes).forEach(tf => {
             const tfData = form.timeframes[tf];
             if (tfData.active) {
                const targetVal = (tf === 'daily' && form.goalType === 'checkoff') ? 1 : tfData.target;
                const progressVal = oldProgressMap[tf] || 0;
                
                this.habits.push({
                   id: Date.now() + Math.random(),
                   title: form.title.trim(),
                   timeframe: tf,
                   timeOfDay: tf === 'daily' ? tfData.timeOfDay : 'none',
                   category: form.category,
                   goalType: form.goalType,
                   target: targetVal,
                   progress: progressVal,
                   days: [...form.days],
                   order: 999
                });
             }
          });

          this.isAddModalOpen = false;
        }

      }))
    })
  </script>
</body>
