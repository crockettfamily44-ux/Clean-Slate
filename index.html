<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Clean Slate</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/sortablejs@latest/Sortable.min.js"></script>
  <script defer src="https://cdn.jsdelivr.net/npm/@alpinejs/persist@3.x.x/dist/cdn.min.js"></script>
  <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
  <style> 
    [x-cloak] { display: none !important; } 
    .sortable-ghost { opacity: 0.4; transform: scale(0.95); }
    .sortable-drag { box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.1), 0 10px 10px -5px rgba(0, 0, 0, 0.04); }
  </style>
</head>
<body class="bg-gradient-to-br from-emerald-50 via-white to-slate-50 font-sans text-slate-900 antialiased overflow-x-hidden selection:bg-emerald-100 min-h-screen" x-data="habitApp">

  <audio id="clickSound" src="https://assets.mixkit.co/active_storage/sfx/2995/2995-preview.mp3" preload="auto"></audio>

  <div class="w-full pb-40">
    <div class="max-w-6xl mx-auto p-6 md:p-10">
      
      <header class="flex flex-col xl:flex-row justify-between items-start xl:items-end mb-10 gap-6">
        <div>
          <div class="flex items-center gap-4">
            <input type="file" x-ref="profileUpload" accept="image/*" class="hidden" @change="handleProfileUpload">
            <div @click="$refs.profileUpload.click()" class="w-14 h-14 rounded-full border-2 border-slate-300 bg-slate-100 overflow-hidden cursor-pointer shadow-sm hover:border-emerald-500 transition-all flex items-center justify-center shrink-0">
              <template x-if="profileImage"><img :src="profileImage" class="w-full h-full object-cover"></template>
              <template x-if="!profileImage"><svg class="h-6 w-6 text-slate-400" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z" /></svg></template>
            </div>
            <div>
              <h1 class="text-4xl font-light tracking-tight text-slate-900 drop-shadow-sm">Clean Slate.</h1>
              <p class="text-slate-600 mt-1 font-medium text-sm">
                <span x-text="currentDayString" class="font-bold text-emerald-700"></span> • 
                <span x-text="currentDayHabits.length"></span> habits today • <span x-text="totalDailyMinutes"></span> min
              </p>
            </div>
          </div>
          
          <div class="flex flex-wrap gap-2 mt-6">
            <button @click="openAddModal()" class="text-sm font-medium text-white bg-emerald-600 border border-emerald-800 hover:bg-emerald-700 transition-colors px-5 py-2 rounded-full shadow-sm active:scale-95 tracking-tight">+ Add Habit</button>
            <button @click="isEditing = !isEditing" :class="isEditing ? 'bg-emerald-100 text-emerald-800 border-emerald-800 shadow-inner' : 'bg-white text-slate-700 border-slate-800 shadow-sm'" class="text-sm font-medium border transition-all px-5 py-2 rounded-full w-24 active:scale-95">
              <span x-text="isEditing ? 'Done' : 'Edit'"></span>
            </button>
            <button @click="isHistoryModalOpen = true" class="text-sm font-medium bg-slate-800 text-white border border-slate-900 hover:bg-slate-700 transition-colors px-5 py-2 rounded-full shadow-sm flex items-center gap-2 active:scale-95">
              <svg class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path d="M9 19v-6a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2a2 2 0 002-2zM0 0V9a2 2 0 012-2h2a2 2 0 012 2v10m-6 0a2 2 0 002 2h2a2 2 0 002-2m0 0V5a2 2 0 012-2h2a2 2 0 012 2v14a2 2 0 01-2 2h-2a2 2 0 01-2-2z"/></svg> Stats
            </button>
          </div>
        </div>

        <div class="w-full md:w-64 bg-white p-4 rounded-2xl shadow-sm border border-slate-800 flex flex-col justify-between">
          <div class="flex justify-between items-center mb-3">
            <span class="text-[10px] uppercase tracking-widest text-slate-500 font-bold flex items-center gap-1">
              <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4 text-emerald-500" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z" /></svg> Sync (Live)
            </span>
          </div>
          <div class="space-y-2.5">
            <div>
              <div class="flex justify-between text-[10px] font-bold mb-1"><span class="text-rose-500">CALORIES</span><span class="text-slate-700"><span x-text="healthData.calories"></span> / <span x-text="healthData.goalCalories"></span></span></div>
              <div class="w-full h-1.5 bg-slate-100 border border-slate-200 rounded-full overflow-hidden"><div class="h-full bg-rose-500 rounded-full" :style="`width: ${Math.min((healthData.calories / healthData.goalCalories) * 100, 100)}%`"></div></div>
            </div>
            <div>
              <div class="flex justify-between text-[10px] font-bold mb-1"><span class="text-emerald-500">EXERCISE</span><span class="text-slate-700"><span x-text="healthData.exercise"></span> / <span x-text="healthData.goalExercise"></span> min</span></div>
              <div class="w-full h-1.5 bg-slate-100 border border-slate-200 rounded-full overflow-hidden"><div class="h-full bg-emerald-500 rounded-full" :style="`width: ${Math.min((healthData.exercise / healthData.goalExercise) * 100, 100)}%`"></div></div>
            </div>
            <div>
              <div class="flex justify-between text-[10px] font-bold mb-1"><span class="text-cyan-500">SLEEP</span><span class="text-slate-700"><span x-text="healthData.sleep"></span> / <span x-text="healthData.goalSleep"></span> hr</span></div>
              <div class="w-full h-1.5 bg-slate-100 border border-slate-200 rounded-full overflow-hidden"><div class="h-full bg-cyan-500 rounded-full" :style="`width: ${Math.min((healthData.sleep / healthData.goalSleep) * 100, 100)}%`"></div></div>
            </div>
          </div>
        </div>
      </header>

      <div class="grid grid-cols-1 md:grid-cols-3 gap-8">
        <template x-for="timeBlock in ['morning', 'afternoon', 'evening']" :key="timeBlock">
          <div>
            <div class="mb-4">
              <h2 class="flex flex-col mb-2 border-b border-slate-300 pb-2">
                <span class="text-xs uppercase tracking-widest text-slate-600 font-bold" x-text="timeBlock"></span>
                <span class="text-[10px] text-slate-400 font-medium italic" x-text="timeLabels[timeBlock]"></span>
              </h2>
              <div class="w-full h-1 bg-slate-200 rounded-full overflow-hidden border border-slate-300">
                <div class="h-full bg-emerald-500 transition-all duration-700" :style="'width: ' + blockProgress(timeBlock) + '%'"></div>
              </div>
            </div>
            
            <div :id="'list-' + timeBlock" :data-time="timeBlock" class="min-h-[100px] space-y-4">
              <template x-for="habit in currentDayHabits.filter(h => h.timeOfDay === timeBlock)" :key="habit.id">
                <div :data-id="habit.id"
                     @click="if(!isEditing && !habit.isWatch) toggleHabit(habit.id);" 
                     :class="[
                        isEditing && !habit.isWatch ? 'border-emerald-400 bg-emerald-50 border-dashed cursor-default' : 'bg-white border-slate-800 shadow-sm hover:shadow-md',
                        !isEditing && !habit.isWatch ? 'cursor-pointer active:scale-95' : '',
                        habit.isWatch ? 'border-slate-300 bg-slate-50/50' : ''
                     ]"
                     class="habit-card relative overflow-hidden border rounded-3xl p-5 transition-all duration-300 transform group">
                  
                  <div class="absolute bottom-0 left-0 w-full bg-gradient-to-t from-emerald-600 via-emerald-300 to-slate-100 transition-all duration-1000 ease-in-out z-0"
                       :class="habit.checked && (!isEditing || habit.isWatch) ? 'h-full' : 'h-0'"></div>

                  <div class="flex items-center gap-3 relative z-10 pointer-events-none">
                    <div @click.stop class="drag-handle pointer-events-auto text-slate-300 hover:text-slate-500 cursor-grab p-1 -ml-2">
                      <svg class="w-5 h-5" fill="currentColor" viewBox="0 0 24 24"><path d="M8 6a2 2 0 1 1-4 0 2 2 0 0 1 4 0zM8 12a2 2 0 1 1-4 0 2 2 0 0 1 4 0zM8 18a2 2 0 1 1-4 0 2 2 0 0 1 4 0zM20 6a2 2 0 1 1-4 0 2 2 0 0 1 4 0zM20 12a2 2 0 1 1-4 0 2 2 0 0 1 4 0zM20 18a2 2 0 1 1-4 0 2 2 0 0 1 4 0z"/></svg>
                    </div>

                    <div class="flex-1 flex justify-between items-start">
                      <div class="pr-6">
                        <div class="flex items-center gap-2 mb-1">
                          <span class="text-lg" x-text="habit.isWatch ? '⌚' : categoryIcons[habit.category]"></span>
                          <p :class="habit.checked && (!isEditing || habit.isWatch) ? 'text-emerald-900' : 'text-slate-500'" 
                             class="text-[10px] uppercase tracking-widest font-bold transition-colors duration-1000">
                            <span x-text="habit.category"></span>
                          </p>
                        </div>
                        <h2 :class="habit.checked && (!isEditing || habit.isWatch) ? 'text-slate-900' : 'text-slate-900'" 
                            class="text-lg font-bold leading-tight transition-colors duration-1000" 
                            x-text="habit.title"></h2>
                      </div>
                      
                      <div class="absolute bottom-4 right-5 text-[9px] font-black text-slate-400 uppercase tracking-tighter" 
                           :class="habit.checked ? 'text-emerald-900 opacity-60' : 'text-slate-300'"
                           x-text="habit.duration + ' min'"></div>

                      <div class="flex flex-col items-center justify-center min-h-[40px] pointer-events-auto shrink-0">
                        <template x-if="!isEditing || habit.isWatch">
                          <div class="relative w-8 h-8">
                            <svg x-show="!habit.checked" x-cloak x-transition.opacity.duration.300ms class="absolute inset-0 w-8 h-8 text-slate-200" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="9" /></svg>
                            <svg x-show="habit.checked" x-cloak x-transition.opacity.duration.300ms class="absolute inset-0 w-8 h-8 text-emerald-800 drop-shadow-sm" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z" /></svg>
                          </div>
                        </template>

                        <template x-if="isEditing && !habit.isWatch">
                          <div class="flex flex-col gap-2 -mt-1">
                            <button @click.stop="openEditModal(habit)" class="text-slate-400 hover:text-slate-800"><svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path d="M15.232 5.232l3.536 3.536m-2.036-5.036a2.5 2.5 0 113.536 3.536L6.5 21.036H3v-3.572L16.732 3.732z"/></svg></button>
                            <button @click.stop="deleteHabit(habit.id)" class="text-red-300 hover:text-red-600 text-lg font-black">&times;</button>
                          </div>
                        </template>
                      </div>
                    </div>
                  </div>
                </div>
              </template>
            </div>
          </div>
        </template>
      </div>
    </div>
  </div>

  <div class="fixed bottom-0 left-0 w-full bg-white border-t border-slate-800 z-20 flex flex-col shadow-[0_-10px_30px_rgba(0,0,0,0.05)]">
    <div class="p-4 px-6 md:px-10 flex items-center gap-4 bg-white border-b border-slate-100">
      <div class="font-black text-[10px] uppercase tracking-widest text-slate-800 w-24">Daily Goals</div>
      <div class="flex-1 h-3 bg-slate-100 border border-slate-200 rounded-full overflow-hidden relative">
        <div class="absolute top-0 left-0 h-full bg-gradient-to-r from-emerald-500 to-emerald-400 transition-all duration-1000" :style="`width: ${dailyProgressPercentage}%`"></div>
      </div>
      <div class="font-black text-emerald-600 w-12 text-right text-xs" x-text="dailyProgressPercentage + '%'"></div>
    </div>
    <div class="p-3 px-6 md:px-10 flex items-center gap-4 bg-slate-50">
      <div class="font-black text-[9px] uppercase tracking-widest text-slate-400 w-24">Weekly Avg</div>
      <div class="flex-1 h-2 bg-slate-200 border border-slate-300 rounded-full overflow-hidden relative">
        <div class="absolute top-0 left-0 h-full bg-gradient-to-r from-indigo-500 to-indigo-400 transition-all duration-1000" style="width: 35%;"></div>
      </div>
      <div class="font-black text-indigo-500 w-12 text-right text-[10px]">35%</div>
    </div>
  </div>

  <div x-show="isAddModalOpen" x-cloak x-transition.opacity class="fixed inset-0 z-50 flex items-center justify-center bg-slate-900/60 backdrop-blur-sm p-4 overflow-y-auto">
    <div @click.away="isAddModalOpen = false" class="bg-white rounded-3xl p-6 w-full max-w-sm shadow-2xl border border-slate-800 my-8">
      <h3 class="text-xl font-bold mb-4" x-text="editingHabitId ? 'Edit Habit' : 'New Habit'"></h3>
      <template x-if="habitTemplates.length > 0 && !editingHabitId">
        <div class="mb-6 pb-4 border-b border-slate-200 overflow-x-auto whitespace-nowrap">
          <label class="block text-[10px] uppercase tracking-widest font-bold text-slate-400 mb-2">Saved Library</label>
          <div class="flex gap-2 pb-2">
            <template x-for="temp in habitTemplates" :key="temp.title">
              <div class="flex items-center bg-emerald-50 border border-emerald-200 rounded-lg overflow-hidden text-xs font-bold text-emerald-800 shrink-0">
                <button @click="fillFromTemplate(temp)" class="px-3 py-1.5 hover:bg-emerald-100" x-text="temp.title"></button>
                <button @click="deleteTemplate(temp.title)" class="px-2 py-1.5 border-l border-emerald-200 hover:bg-red-500 hover:text-white">&times;</button>
              </div>
            </template>
          </div>
        </div>
      </template>
      <div class="space-y-4">
        <input x-model="newHabit.title" type="text" placeholder="Title..." class="w-full bg-slate-50 border border-slate-300 rounded-xl px-4 py-3 outline-none focus:border-emerald-600 font-medium text-slate-800">
        <div class="grid grid-cols-2 gap-4">
          <select x-model="newHabit.category" class="w-full bg-slate-50 border border-slate-300 rounded-xl px-4 py-3 outline-none appearance-none font-medium">
            <template x-for="cat in Object.keys(categoryIcons)"><option :value="cat" x-text="cat"></option></template>
          </select>
          <select x-model="newHabit.timeOfDay" class="w-full bg-slate-50 border border-slate-300 rounded-xl px-4 py-3 outline-none appearance-none font-medium">
            <option value="morning">Morning</option><option value="afternoon">Afternoon</option><option value="evening">Evening</option>
          </select>
        </div>
        <div>
          <label class="block text-xs font-bold text-slate-400 mb-1">DURATION (MIN)</label>
          <input x-model="newHabit.duration" type="number" step="5" class="w-full bg-slate-50 border border-slate-300 rounded-xl px-4 py-3 outline-none font-medium">
        </div>
        <div class="flex justify-between gap-1">
          <template x-for="day in daysOfWeek"><button @click="toggleDay(day)" :class="newHabit.days.includes(day) ? 'bg-emerald-600 text-white border-emerald-800' : 'bg-slate-50 text-slate-400 border-slate-200'" class="flex-1 py-2 text-[10px] font-bold rounded-lg border uppercase transition-colors" x-text="day"></button></template>
        </div>
      </div>
      <div class="mt-8 flex gap-3">
        <button @click="isAddModalOpen = false" class="flex-1 bg-white border border-slate-800 text-slate-800 font-bold py-3 rounded-xl active:scale-95">Cancel</button>
        <button @click="saveHabit()" class="flex-1 bg-emerald-600 border border-emerald-800 text-white font-bold py-3 rounded-xl shadow-md active:scale-95">Save</button>
      </div>
    </div>
  </div>

  <script>
    document.addEventListener('alpine:init', () => {
      Alpine.data('habitApp', () => ({
        isEditing: false, isAddModalOpen: false, isHistoryModalOpen: false, editingHabitId: null,
        daysOfWeek: ['Mon', 'Tue', 'Wed', 'Thu', 'Fri', 'Sat', 'Sun'],
        currentDayString: new Date().toLocaleDateString('en-US', { weekday: 'short' }),
        profileImage: Alpine.$persist(null),
        habitTemplates: Alpine.$persist([]),
        timeLabels: { morning: '(6:00 AM - 12:00 PM)', afternoon: '(12:00 PM - 6:00 PM)', evening: '(6:00 PM - 12:00 AM)' },
        healthPrefs: Alpine.$persist({ h_move: { timeOfDay: 'morning', order: -3 }, h_ex: { timeOfDay: 'afternoon', order: -2 }, h_sleep: { timeOfDay: 'evening', order: -1 } }),
        healthData: { calories: 0, goalCalories: 2500, exercise: 0, goalExercise: 30, sleep: 0, goalSleep: 7.5 },

        async fetchHealthData() {
          const supabaseUrl = 'https://vzkkjpaqteiqyomwalzr.supabase.co'; 
          const anonKey = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InZ6a2tqcGFxdGVpcXlvbXdhbHpyIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzgzNjIwNjAsImV4cCI6MjA5MzkzODA2MH0.xu0nctOWwIPWQ5E-MzypSLOhhZmsIj-Np5o992tXN_Q'; 
          const now = new Date();
          const offset = now.getTimezoneOffset();
          const localDate = new Date(now.getTime() - (offset * 60 * 1000));
          const dateString = localDate.toISOString().split('T')[0];
          try {
            const res = await fetch(`${supabaseUrl}/rest/v1/health_metrics?date=eq.${dateString}&select=*`, {
              headers: { 'apikey': anonKey, 'Authorization': `Bearer ${anonKey}` }
            });
            const data = await res.json();
            if (data?.length > 0) {
              const d = data[data.length-1];
              this.healthData.calories = d.calories || 0;
              this.healthData.exercise = d.exercise || 0;
              this.healthData.sleep = d.sleep ? Math.round(d.sleep * 10) / 10 : 0; 
            }
          } catch (e) {}
        },

        lastOpenedDate: Alpine.$persist(new Date().toDateString()),
        habits: Alpine.$persist([
          { id: 1, title: 'Morning Reading', timeOfDay: 'morning', category: 'Faith', duration: 15, checked: false, order: 0, days: ['Mon', 'Tue', 'Wed', 'Thu', 'Fri', 'Sat', 'Sun'] },
          { id: 2, title: 'Review School Data', timeOfDay: 'afternoon', category: 'Work', duration: 60, checked: false, order: 1, days: ['Mon', 'Tue', 'Wed', 'Thu', 'Fri'] }
        ]),
        categoryIcons: { 'Faith': '🕊️', 'Family': '👨‍👩‍👧', 'Friends/Others': '🤝', 'Health/Sleep': '🏃', 'Work': '💼', 'Home': '🏠', 'Leisure': '📖' },
        newHabit: { title: '', category: 'Health/Sleep', timeOfDay: 'morning', duration: 15, days: ['Mon', 'Tue', 'Wed', 'Thu', 'Fri', 'Sat', 'Sun'] },

        init() {
          const today = new Date().toDateString();
          if (this.lastOpenedDate !== today) { this.habits.forEach(h => h.checked = false); this.lastOpenedDate = today; }
          this.fetchHealthData();
          this.$nextTick(() => { this.setupSortable(); });
        },

        setupSortable() {
          ['morning', 'afternoon', 'evening'].forEach(block => {
            new Sortable(document.getElementById('list-' + block), {
              group: 'shared', handle: '.drag-handle', animation: 150, onEnd: (evt) => {
                const id = evt.item.dataset.id;
                const newTime = evt.to.dataset.time;
                const newOrders = {};
                Array.from(evt.to.children).forEach((el, index) => { newOrders[el.dataset.id] = index; });
                if (id.startsWith('h_')) { this.healthPrefs[id].timeOfDay = newTime; } 
                else { const h = this.habits.find(h => h.id == id); if(h) h.timeOfDay = newTime; }
                this.habits.forEach(h => { if (newOrders[h.id] !== undefined) h.order = newOrders[h.id]; });
                Object.keys(this.healthPrefs).forEach(key => { if (newOrders[key] !== undefined) this.healthPrefs[key].order = newOrders[key]; });
                this.habits = [...this.habits];
                this.healthPrefs = {...this.healthPrefs};
              }
            });
          });
        },

        handleProfileUpload(event) {
          const file = event.target.files[0]; if(!file) return;
          const reader = new FileReader(); reader.onload = (e) => { this.profileImage = e.target.result; }; reader.readAsDataURL(file);
        },

        get combinedHabits() {
          const tiles = [
            { id: 'h_move', title: `Hit Calorie Goal`, timeOfDay: this.healthPrefs.h_move.timeOfDay, category: 'Health/Sync', duration: 30, checked: this.healthData.calories >= this.healthData.goalCalories, isWatch: true, order: this.healthPrefs.h_move.order, days: this.daysOfWeek },
            { id: 'h_ex', title: `Close Exercise Ring`, timeOfDay: this.healthPrefs.h_ex.timeOfDay, category: 'Health/Sync', duration: 30, checked: this.healthData.exercise >= this.healthData.goalExercise, isWatch: true, order: this.healthPrefs.h_ex.order, days: this.daysOfWeek },
            { id: 'h_sleep', title: `Hit Sleep Target`, timeOfDay: this.healthPrefs.h_sleep.timeOfDay, category: 'Health/Sync', duration: 30, checked: this.healthData.sleep >= this.healthData.goalSleep, isWatch: true, order: this.healthPrefs.h_sleep.order, days: this.daysOfWeek }
          ];
          return [...tiles, ...this.habits].sort((a, b) => (a.order || 0) - (b.order || 0));
        },

        get currentDayHabits() { return this.combinedHabits.filter(h => h.days.includes(this.currentDayString)); },
        blockMinutes(block) { return this.currentDayHabits.filter(h => h.timeOfDay === block).reduce((s, h) => s + h.duration, 0); },
        blockProgress(block) {
          const items = this.currentDayHabits.filter(h => h.timeOfDay === block);
          if(items.length === 0) return 0;
          return Math.round((items.filter(h => h.checked).length / items.length) * 100);
        },

        toggleHabit(id) {
          if(id.toString().startsWith('h_')) return;
          const h = this.habits.find(h => h.id === id);
          if (h) {
            h.checked = !h.checked;
            if (h.checked) { document.getElementById('clickSound').cloneNode().play(); }
          }
        },

        deleteHabit(id) { this.habits = this.habits.filter(h => h.id !== id); },
        fillFromTemplate(t) { Object.assign(this.newHabit, t); },
        deleteTemplate(title) { this.habitTemplates = this.habitTemplates.filter(t => t.title !== title); },
        toggleDay(d) { if (this.newHabit.days.includes(d)) { this.newHabit.days = this.newHabit.days.filter(x => x !== d); } else { this.newHabit.days.push(d); } },
        openAddModal() { this.editingHabitId = null; this.newHabit = { title: '', category: 'Health/Sleep', timeOfDay: 'morning', duration: 15, days: [...this.daysOfWeek] }; this.isAddModalOpen = true; },
        openEditModal(h) { this.editingHabitId = h.id; Object.assign(this.newHabit, h); this.newHabit.days = [...h.days]; this.isAddModalOpen = true; },

        saveHabit() {
          if (!this.newHabit.title.trim()) return;
          if (!this.habitTemplates.some(t => t.title.toLowerCase() === this.newHabit.title.toLowerCase())) { this.habitTemplates.push({ ...this.newHabit }); }
          if (this.editingHabitId) {
            const h = this.habits.find(h => h.id === this.editingHabitId);
            if (h) { Object.assign(h, this.newHabit); h.duration = parseInt(this.newHabit.duration); }
          } else {
            this.habits.push({ id: Date.now(), ...this.newHabit, duration: parseInt(this.newHabit.duration) || 5, checked: false, order: 999 });
          }
          this.isAddModalOpen = false;
        },

        get totalDailyMinutes() { return this.currentDayHabits.reduce((s, h) => s + h.duration, 0); },
        get dailyProgressPercentage() {
          const total = this.totalDailyMinutes; if (total === 0) return 0;
          const done = this.currentDayHabits.filter(h => h.checked).reduce((s, h) => s + h.duration, 0);
          return Math.round((done / total) * 100);
        }
      }))
    })
  </script>
</body>
</html>
