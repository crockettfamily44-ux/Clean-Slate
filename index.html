<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Clean Slate</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/sortablejs@latest/Sortable.min.js"></script>
  <script defer src="https://cdn.jsdelivr.net/npm/@alpinejs/persist@3.x.x/dist/cdn.min.js"></script>
  <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
  <style> 
    [x-cloak] { display: none !important; } 
    .sortable-ghost { opacity: 0.4; transform: scale(0.95); }
    .sortable-drag { box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.1), 0 10px 10px -5px rgba(0, 0, 0, 0.04); }
    .custom-scroll::-webkit-scrollbar { width: 4px; }
    .custom-scroll::-webkit-scrollbar-track { background: transparent; }
    .custom-scroll::-webkit-scrollbar-thumb { background: #e2e8f0; border-radius: 10px; }
  </style>
</head>
<body class="bg-gradient-to-br from-emerald-50 via-white to-slate-50 font-sans text-slate-900 antialiased overflow-x-hidden selection:bg-emerald-100 min-h-screen" x-data="habitApp">

  <audio id="clickSound" src="https://assets.mixkit.co/active_storage/sfx/2995/2995-preview.mp3" preload="auto"></audio>

  <div class="w-full pb-48">
    <div class="max-w-6xl mx-auto p-6 md:p-10">
      
      <header class="flex flex-col xl:flex-row justify-between items-start xl:items-end mb-10 gap-6">
        <div class="flex items-center gap-4">
          <input type="file" x-ref="profileUpload" accept="image/*" class="hidden" @change="handleProfileUpload">
          <div @click="$refs.profileUpload.click()" class="w-14 h-14 rounded-full border-2 border-slate-300 bg-slate-100 overflow-hidden cursor-pointer shadow-sm hover:border-emerald-500 transition-all flex items-center justify-center shrink-0">
            <template x-if="profileImage"><img :src="profileImage" class="w-full h-full object-cover"></template>
            <template x-if="!profileImage"><svg class="h-6 w-6 text-slate-400" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z" /></svg></template>
          </div>
          <div>
            <h1 class="text-4xl font-light tracking-tight text-slate-900 drop-shadow-sm">Clean Slate.</h1>
            <p class="text-slate-600 mt-1 font-medium text-sm">
              <span x-text="currentDayString" class="font-bold text-emerald-700"></span> • 
              <span x-text="currentDayHabits.length"></span> habits today • <span x-text="totalDailyMinutes"></span> min
            </p>
          </div>
        </div>
        
        <div class="flex flex-wrap gap-2">
          <button @click="openAddModal()" class="text-sm font-medium text-white bg-emerald-600 border border-emerald-800 hover:bg-emerald-700 px-5 py-2 rounded-full shadow-sm active:scale-95 transition-all">+ Add Habit</button>
          <button @click="isEditing = !isEditing" :class="isEditing ? 'bg-emerald-100 text-emerald-800 border-emerald-800 shadow-inner' : 'bg-white text-slate-700 border-slate-800 shadow-sm'" class="text-sm font-medium border transition-all px-5 py-2 rounded-full w-24 active:scale-95">
            <span x-text="isEditing ? 'Done' : 'Edit'"></span>
          </button>
          <button @click="isStatsOpen = true" class="text-sm font-medium bg-slate-800 text-white border border-slate-900 px-5 py-2 rounded-full flex items-center gap-2 active:scale-95 transition-all">
            <svg class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path d="M9 19v-6a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2a2 2 0 002-2zm0 0V9a2 2 0 012-2h2a2 2 0 012 2v10m-6 0a2 2 0 002 2h2a2 2 0 002-2m0 0V5a2 2 0 012-2h2a2 2 0 012 2v14a2 2 0 01-2 2h-2a2 2 0 01-2-2z" /></svg> Stats
          </button>
        </div>
      </header>

      <div class="grid grid-cols-1 md:grid-cols-3 gap-8">
        <template x-for="timeBlock in ['morning', 'afternoon', 'evening']" :key="timeBlock">
          <div class="flex flex-col gap-6">
            
            <div>
              <div class="mb-4">
                <h2 class="flex flex-col mb-2 border-b border-slate-300 pb-2">
                  <span class="text-xs uppercase tracking-widest text-slate-600 font-bold" x-text="timeBlock"></span>
                  <div class="flex items-center gap-1 mt-1">
                    <template x-if="!isEditing">
                      <span class="text-[10px] text-slate-400 font-medium" x-text="'(' + timeWindows[timeBlock] + ')'"></span>
                    </template>
                    <template x-if="isEditing">
                      <input x-model="timeWindows[timeBlock]" class="text-[10px] border border-emerald-300 bg-emerald-50 rounded px-1 w-full outline-none text-emerald-800">
                    </template>
                  </div>
                </h2>
                <div class="w-full h-1 bg-slate-200 rounded-full overflow-hidden border border-slate-300">
                  <div class="h-full bg-emerald-500 transition-all duration-700" :style="'width: ' + blockProgress(timeBlock) + '%'"></div>
                </div>
              </div>
              
              <div :id="'list-' + timeBlock" :data-time="timeBlock" class="min-h-[50px] space-y-3">
                <template x-for="habit in currentDayHabits.filter(h => h.timeOfDay === timeBlock && !h.isWeekly)" :key="habit.id">
                  <div :data-id="habit.id" @click="if(!isEditing && !habit.isWatch) toggleHabit(habit.id)" 
                       :class="[habit.isWatch ? 'border-slate-300 bg-slate-50/50' : 'bg-white border-slate-800 shadow-sm hover:shadow-md']"
                       class="habit-card relative overflow-hidden border rounded-2xl p-4 transition-all duration-300 transform active:scale-95 group cursor-pointer">
                    <div class="absolute bottom-0 left-0 w-full bg-gradient-to-t from-emerald-600 via-emerald-300 to-slate-100 transition-all duration-1000" :class="habit.checked ? 'h-full' : 'h-0'"></div>
                    <div class="relative z-10 flex items-center gap-3">
                      <div @click.stop class="drag-handle text-slate-300 hover:text-slate-500 cursor-grab p-1 -ml-2">
                        <svg class="w-4 h-4" fill="currentColor" viewBox="0 0 24 24"><path d="M8 6a2 2 0 1 1-4 0 2 2 0 0 1 4 0zM8 12a2 2 0 1 1-4 0 2 2 0 0 1 4 0zM8 18a2 2 0 1 1-4 0 2 2 0 0 1 4 0zM20 6a2 2 0 1 1-4 0 2 2 0 0 1 4 0zM20 12a2 2 0 1 1-4 0 2 2 0 0 1 4 0zM20 18a2 2 0 1 1-4 0 2 2 0 0 1 4 0z"/></svg>
                      </div>
                      <div class="flex-1 flex justify-between items-center">
                        <div>
                          <div class="flex items-center gap-2">
                            <span class="text-sm" x-text="habit.isWatch ? '⌚' : categoryIcons[habit.category]"></span>
                            <h2 class="text-sm font-bold leading-tight" x-text="habit.title"></h2>
                          </div>
                        </div>
                        <template x-if="isEditing && !habit.isWatch">
                           <button @click.stop="deleteHabit(habit.id)" class="text-red-400 hover:text-red-600 transition-colors text-lg font-black">&times;</button>
                        </template>
                      </div>
                    </div>
                  </div>
                </template>
              </div>
            </div>

            <div class="relative py-4">
              <div class="absolute inset-0 flex items-center"><div class="w-full border-t border-slate-200"></div></div>
              <div class="relative flex justify-center text-[10px] uppercase tracking-widest text-slate-400 font-bold bg-white px-3 w-max mx-auto italic">Weekly Flow</div>
            </div>

            <div :id="'weekly-' + timeBlock" :data-time="timeBlock" class="min-h-[50px] space-y-2 opacity-80">
              <template x-for="habit in habits.filter(h => h.timeOfDay === timeBlock && h.isWeekly)" :key="habit.id">
                <div :data-id="habit.id" @click="if(!isEditing) toggleHabit(habit.id)" 
                     class="bg-slate-50 border border-slate-300 rounded-xl p-3 transition-all active:scale-95 cursor-pointer hover:border-indigo-400 group">
                  <div class="flex items-center justify-between">
                    <div class="flex items-center gap-2">
                      <span class="grayscale group-hover:grayscale-0 transition-all" x-text="categoryIcons[habit.category]"></span>
                      <span class="text-xs font-bold text-slate-600" :class="habit.checked ? 'line-through text-slate-400' : ''" x-text="habit.title"></span>
                    </div>
                    <div class="w-3 h-3 rounded-full border-2 border-slate-300" :class="habit.checked ? 'bg-indigo-500 border-indigo-600' : ''"></div>
                  </div>
                </div>
              </template>
            </div>

          </div>
        </template>
      </div>
    </div>
  </div>

  <div class="fixed bottom-0 left-0 w-full bg-white border-t border-slate-800 z-20 flex flex-col shadow-[0_-10px_30px_rgba(0,0,0,0.05)]">
    <div class="p-4 px-6 md:px-10 flex items-center gap-4 bg-white border-b border-slate-100">
      <div class="font-black text-[10px] uppercase tracking-widest text-slate-800 w-24">Daily Goals</div>
      <div class="flex-1 h-3 bg-slate-100 border border-slate-200 rounded-full overflow-hidden relative shadow-inner">
        <div class="absolute top-0 left-0 h-full bg-gradient-to-r from-emerald-500 to-emerald-400 transition-all duration-1000 ease-out" :style="`width: ${dailyProgressPercentage}%`"></div>
      </div>
      <div class="font-black text-emerald-600 w-12 text-right text-xs"><span x-text="dailyProgressPercentage"></span>%</div>
    </div>
    <div class="p-3 px-6 md:px-10 flex items-center gap-4 bg-slate-50">
      <div class="font-black text-[9px] uppercase tracking-widest text-slate-400 w-24">Weekly Avg</div>
      <div class="flex-1 h-2 bg-slate-200 border border-slate-300 rounded-full overflow-hidden relative shadow-inner">
        <div class="absolute top-0 left-0 h-full bg-gradient-to-r from-indigo-500 to-indigo-400 transition-all duration-1000 ease-out" :style="`width: ${weeklyProgressPercentage}%` "></div>
      </div>
      <div class="font-black text-indigo-500 w-12 text-right text-[10px]"><span x-text="weeklyProgressPercentage"></span>%</div>
    </div>
  </div>

  <div x-show="isAddModalOpen" x-cloak x-transition.opacity class="fixed inset-0 z-50 flex items-center justify-center bg-slate-900/60 backdrop-blur-sm p-4 overflow-y-auto">
    <div @click.away="isAddModalOpen = false" class="bg-white rounded-3xl p-6 w-full max-w-sm shadow-2xl border border-slate-800 transform transition-all my-8">
      <h3 class="text-xl font-bold mb-4">Add Item</h3>
      
      <template x-if="habitTemplates.length > 0">
        <div class="mb-6 pb-4 border-b border-slate-200 overflow-x-auto whitespace-nowrap custom-scroll">
          <label class="block text-[10px] uppercase tracking-widest font-black text-slate-400 mb-2">Library</label>
          <div class="flex gap-2 pb-2">
            <template x-for="temp in habitTemplates" :key="temp.title">
              <div class="flex items-center bg-emerald-50 border border-emerald-200 rounded-lg overflow-hidden text-[10px] font-bold text-emerald-800 shadow-sm">
                <button @click="fillFromTemplate(temp)" class="px-3 py-1.5 hover:bg-emerald-100" x-text="temp.title"></button>
                <button @click="deleteTemplate(temp.title)" class="px-2 py-1.5 border-l border-emerald-200 hover:bg-red-500 hover:text-white">&times;</button>
              </div>
            </template>
          </div>
        </div>
      </template>

      <div class="space-y-4">
        <input x-model="newHabit.title" type="text" placeholder="Drink 8 glasses of water..." class="w-full bg-slate-50 border border-slate-300 rounded-xl px-4 py-3 outline-none focus:border-emerald-600 font-medium">
        <div class="grid grid-cols-2 gap-3">
          <select x-model="newHabit.category" class="w-full bg-slate-50 border border-slate-300 rounded-xl px-3 py-2 text-sm outline-none">
            <template x-for="cat in Object.keys(categoryIcons)"><option :value="cat" x-text="cat"></option></template>
          </select>
          <select x-model="newHabit.timeOfDay" class="w-full bg-slate-50 border border-slate-300 rounded-xl px-3 py-2 text-sm outline-none">
            <option value="morning">Morning</option><option value="afternoon">Afternoon</option><option value="evening">Evening</option>
          </select>
        </div>
        <div class="flex items-center gap-2 px-3 py-3 bg-slate-50 rounded-xl border border-slate-200">
          <input type="checkbox" x-model="newHabit.isWeekly" id="isWeekly" class="w-4 h-4 rounded text-emerald-600">
          <label for="isWeekly" class="text-xs font-black text-slate-500 uppercase tracking-tighter">Weekly Task (Skip Daily Bar)</label>
        </div>
        <div>
          <label class="block text-[10px] font-black uppercase text-slate-400 mb-1">Duration (Min)</label>
          <input x-model="newHabit.duration" type="number" step="5" class="w-full bg-slate-50 border border-slate-300 rounded-xl px-4 py-2 outline-none font-medium">
        </div>
      </div>
      <div class="mt-8 flex gap-3">
        <button @click="isAddModalOpen = false" class="flex-1 bg-white border border-slate-800 text-slate-800 font-bold py-3 rounded-xl hover:bg-slate-50">Cancel</button>
        <button @click="saveHabit()" class="flex-1 bg-emerald-600 border border-emerald-800 text-white font-bold py-3 rounded-xl hover:bg-emerald-700 shadow-md">Save</button>
      </div>
    </div>
  </div>

  <div x-show="isStatsOpen" x-cloak class="fixed inset-0 z-[60] flex items-center justify-center bg-slate-900/80 backdrop-blur-md p-4">
    <div @click.away="isStatsOpen = false" class="bg-white rounded-[2rem] w-full max-w-4xl max-h-[90vh] overflow-hidden flex flex-col border border-slate-800 shadow-2xl">
      
      <header class="p-8 border-b flex justify-between items-center bg-slate-50">
        <div>
          <h2 class="text-3xl font-black text-slate-800 tracking-tighter italic">COMMAND CENTER</h2>
          <div class="flex gap-2 mt-3">
            <template x-for="range in ['Week', 'Month', 'Year']">
              <button @click="statRange = range" :class="statRange === range ? 'bg-slate-800 text-white shadow-lg' : 'bg-white border text-slate-400'" 
                      class="px-4 py-1.5 rounded-full text-[10px] font-black uppercase transition-all" x-text="range"></button>
            </template>
          </div>
        </div>
        <button @click="isStatsOpen = false" class="bg-white border-2 border-slate-200 p-3 rounded-full hover:bg-rose-50 hover:border-rose-200 transition-colors">&times;</button>
      </header>
      
      <div class="flex-1 overflow-y-auto p-8 custom-scroll grid grid-cols-1 lg:grid-cols-3 gap-8">
        
        <div class="lg:col-span-2 space-y-8">
          
          <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
             <div class="bg-emerald-50 p-6 rounded-[2rem] border border-emerald-100">
                <p class="text-[10px] font-black text-emerald-700 uppercase mb-4 tracking-widest">🏆 Top 3 MVPs</p>
                <div class="space-y-3">
                   <template x-for="h in topHabits"><div class="flex justify-between items-center bg-white/50 p-2 rounded-lg text-sm font-bold border border-emerald-200/50"><span x-text="h.title"></span><span class="bg-emerald-600 text-white px-2 py-0.5 rounded text-[10px]" x-text="h.score + ' Checks'"></span></div></template>
                </div>
             </div>
             <div class="bg-rose-50 p-6 rounded-[2rem] border border-rose-100">
                <p class="text-[10px] font-black text-rose-700 uppercase mb-4 tracking-widest">⚠️ Needs Love</p>
                <div class="space-y-3">
                   <template x-for="h in bottomHabits"><div class="flex justify-between items-center bg-white/50 p-2 rounded-lg text-sm font-bold border border-rose-200/50"><span x-text="h.title"></span><span class="text-rose-400 text-[10px]">Overdue</span></div></template>
                </div>
             </div>
          </div>

          <div class="bg-white border border-slate-200 p-8 rounded-[2rem] shadow-sm">
             <p class="text-[10px] font-black text-slate-400 uppercase mb-6 tracking-widest">Time Allocation (Current Session)</p>
             <div class="space-y-6">
                <template x-for="(mins, cat) in categoryBreakdown">
                   <div>
                     <div class="flex justify-between text-[11px] font-black text-slate-600 mb-2"><span x-text="cat.toUpperCase()"></span><span x-text="mins + ' MIN'"></span></div>
                     <div class="w-full h-2 bg-slate-100 rounded-full overflow-hidden shadow-inner"><div class="h-full bg-slate-800 rounded-full transition-all duration-1000" :style="`width: ${(mins/totalMins)*100}%`"></div></div>
                   </div>
                </template>
             </div>
          </div>
        </div>

        <div class="space-y-8">
           <div class="bg-slate-900 p-6 rounded-[2rem] text-white shadow-xl">
              <p class="text-[10px] font-black text-indigo-400 uppercase mb-6 tracking-[0.2em]">Health Insights</p>
              <div class="space-y-6">
                 <div>
                   <div class="flex justify-between text-[11px] font-bold mb-2"><span>EXERCISE</span><span class="text-emerald-400" x-text="healthData.exercise + 'm'"></span></div>
                   <div class="w-full h-1 bg-slate-800 rounded-full overflow-hidden"><div class="h-full bg-emerald-400 shadow-[0_0_8px_#34d399]" :style="`width: ${(healthData.exercise/healthData.goalExercise)*100}%`"></div></div>
                 </div>
                 <div>
                   <div class="flex justify-between text-[11px] font-bold mb-2"><span>ENERGY</span><span class="text-rose-400" x-text="healthData.calories"></span></div>
                   <div class="w-full h-1 bg-slate-800 rounded-full overflow-hidden"><div class="h-full bg-rose-400 shadow-[0_0_8px_#fb7185]" :style="`width: ${(healthData.calories/healthData.goalCalories)*100}%`"></div></div>
                 </div>
                 <div>
                   <div class="flex justify-between text-[11px] font-bold mb-2"><span>RECOVERY</span><span class="text-cyan-400" x-text="healthData.sleep + 'h'"></span></div>
                   <div class="w-full h-1 bg-slate-800 rounded-full overflow-hidden"><div class="h-full bg-cyan-400 shadow-[0_0_8px_#22d3ee]" :style="`width: ${(healthData.sleep/healthData.goalSleep)*100}%`"></div></div>
                 </div>
              </div>
              <p class="text-[9px] text-slate-500 mt-8 leading-relaxed">Aggregated from your private Supabase connection. Reflects current <span x-text="statRange"></span> goals.</p>
           </div>

           <div class="bg-white border-2 border-slate-100 p-6 rounded-[2rem]">
              <p class="text-[10px] font-black text-slate-400 uppercase mb-6 tracking-widest">Peak Efficiency Periods</p>
              <template x-for="block in ['morning', 'afternoon', 'evening']">
                 <div class="flex items-center gap-4 mb-5">
                   <div class="w-10 text-[9px] font-black text-slate-400 uppercase tracking-tighter" x-text="block"></div>
                   <div class="flex-1 h-2.5 bg-slate-50 rounded-full border border-slate-200 overflow-hidden"><div class="h-full bg-indigo-500 transition-all duration-1000" :style="`width: ${blockEfficiency(block)}%`"></div></div>
                   <div class="text-[10px] font-black text-slate-800" x-text="blockEfficiency(block) + '%'"></div>
                 </div>
              </template>
           </div>
        </div>

      </div>
    </div>
  </div>

  <script>
    document.addEventListener('alpine:init', () => {
      Alpine.data('habitApp', () => ({
        isEditing: false,
        isAddModalOpen: false,
        isStatsOpen: false,
        statRange: 'Week',
        
        daysOfWeek: ['Mon', 'Tue', 'Wed', 'Thu', 'Fri', 'Sat', 'Sun'],
        currentDayString: new Date().toLocaleDateString('en-US', { weekday: 'short' }),
        profileImage: Alpine.$persist(null),
        
        // Editable Time Frames
        timeWindows: Alpine.$persist({
          morning: '6:00 A.M. - 12:00 P.M.',
          afternoon: '12:00 P.M. - 6:00 P.M.',
          evening: '6:00 P.M. - 12:00 A.M.'
        }),

        // Drag Position Memory
        healthPrefs: Alpine.$persist({
          h_m: { timeOfDay: 'morning', order: -3 },
          h_e: { timeOfDay: 'afternoon', order: -2 },
          h_s: { timeOfDay: 'evening', order: -1 }
        }),

        healthData: { calories: 0, goalCalories: 2500, exercise: 0, goalExercise: 30, sleep: 0, goalSleep: 7.5 },
        habitTemplates: Alpine.$persist([]),

        habits: Alpine.$persist([
          { id: 1, title: 'Morning Reading', timeOfDay: 'morning', category: 'Faith', duration: 15, checked: false, days: ['Mon', 'Tue', 'Wed', 'Thu', 'Fri', 'Sat', 'Sun'], isWeekly: false, order: 0 },
          { id: 2, title: 'Review School Data', timeOfDay: 'afternoon', category: 'Work', duration: 60, checked: false, days: ['Mon', 'Tue', 'Wed', 'Thu', 'Fri'], isWeekly: false, order: 1 }
        ]),
        
        categoryIcons: { 'Faith': '🕊️', 'Family': '👨‍👩‍👧', 'Health/Sleep': '🏃', 'Work': '💼', 'Home': '🏠', 'Leisure': '📖' },
        newHabit: { title: '', category: 'Health/Sleep', timeOfDay: 'morning', duration: 15, isWeekly: false },

        lastOpenedDate: Alpine.$persist(new Date().toDateString()),

        init() {
          const today = new Date().toDateString();
          if (this.lastOpenedDate !== today) {
            this.habits.filter(h => !h.isWeekly).forEach(h => h.checked = false);
            this.lastOpenedDate = today;
          }
          this.fetchHealthData();
          this.setupSortable();
        },

        async fetchHealthData() {
          const supabaseUrl = 'https://vzkkjpaqteiqyomwalzr.supabase.co'; 
          const anonKey = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InZ6a2tqcGFxdGVpcXlvbXdhbHpyIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzgzNjIwNjAsImV4cCI6MjA5MzkzODA2MH0.xu0nctOWwIPWQ5E-MzypSLOhhZmsIj-Np5o992tXN_Q'; 
          const dateString = new Date().toISOString().split('T')[0];
          try {
            const res = await fetch(`${supabaseUrl}/rest/v1/health_metrics?date=eq.${dateString}&select=*`, {
              headers: { 'apikey': anonKey, 'Authorization': `Bearer ${anonKey}` }
            });
            const data = await res.json();
            if (data?.length > 0) {
              const d = data[data.length-1];
              this.healthData.calories = d.calories || 0;
              this.healthData.exercise = d.exercise || 0;
              this.healthData.sleep = d.sleep ? Math.round(d.sleep * 10) / 10 : 0;
            }
          } catch(e) { console.log("Fetch failed"); }
        },

        get currentDayHabits() {
          const watchTiles = [
            { id: 'h_m', title: 'Calorie Goal', timeOfDay: this.healthPrefs.h_m.timeOfDay, checked: this.healthData.calories >= this.healthData.goalCalories, isWatch: true, duration: 30, order: this.healthPrefs.h_m.order, days: [this.currentDayString] },
            { id: 'h_e', title: 'Exercise Goal', timeOfDay: this.healthPrefs.h_e.timeOfDay, checked: this.healthData.exercise >= this.healthData.goalExercise, isWatch: true, duration: 30, order: this.healthPrefs.h_e.order, days: [this.currentDayString] },
            { id: 'h_s', title: 'Sleep Goal', timeOfDay: this.healthPrefs.h_s.timeOfDay, checked: this.healthData.sleep >= this.healthData.goalSleep, isWatch: true, duration: 30, order: this.healthPrefs.h_s.order, days: [this.currentDayString] }
          ];
          return [...watchTiles, ...this.habits.filter(h => h.days.includes(this.currentDayString) && !h.isWeekly)].sort((a,b) => a.order - b.order);
        },

        blockProgress(block) {
          const items = this.currentDayHabits.filter(h => h.timeOfDay === block);
          return items.length ? Math.round((items.filter(i => i.checked).length / items.length) * 100) : 0;
        },

        blockMinutes(block) { return this.currentDayHabits.filter(h => h.timeOfDay === block).reduce((s, h) => s + h.duration, 0); },

        toggleHabit(id) {
          const h = this.habits.find(x => x.id === id);
          if (h) {
            h.checked = !h.checked;
            if (h.checked) {
              const s = document.getElementById('clickSound').cloneNode();
              s.play();
            }
          }
        },

        openAddModal() { this.newHabit = { title: '', category: 'Work', timeOfDay: 'morning', duration: 15, isWeekly: false }; this.isAddModalOpen = true; },
        fillFromTemplate(t) { this.newHabit.title = t.title; this.newHabit.category = t.category; this.newHabit.duration = t.duration; },
        deleteTemplate(title) { this.habitTemplates = this.habitTemplates.filter(x => x.title !== title); },

        saveHabit() {
          if (!this.newHabit.title.trim()) return;
          if (!this.habitTemplates.some(x => x.title === this.newHabit.title)) {
            this.habitTemplates.push({ title: this.newHabit.title, category: this.newHabit.category, duration: this.newHabit.duration });
          }
          this.habits.push({ ...this.newHabit, id: Date.now(), checked: false, order: 999, days: this.newHabit.isWeekly ? [] : [...this.daysOfWeek] });
          this.isAddModalOpen = false;
        },

        deleteHabit(id) { this.habits = this.habits.filter(x => x.id !== id); },
        handleProfileUpload(e) {
          const reader = new FileReader();
          reader.onload = (ev) => this.profileImage = ev.target.result;
          reader.readAsDataURL(e.target.files[0]);
        },

        // Progress Calculations
        get totalDailyMinutes() { return this.currentDayHabits.reduce((s, h) => s + h.duration, 0); },
        get dailyProgressPercentage() {
          const checked = this.currentDayHabits.filter(h => h.checked).reduce((s, h) => s + h.duration, 0);
          return this.totalDailyMinutes ? Math.round((checked / this.totalDailyMinutes) * 100) : 0;
        },
        get weeklyProgressPercentage() {
          const totalDailyPool = this.habits.filter(h => !h.isWeekly).length * 7;
          const weeklyTasks = this.habits.filter(h => h.isWeekly).length;
          const totalChecks = this.habits.filter(h => h.checked).length;
          return (totalDailyPool + weeklyTasks) ? Math.round((totalChecks / (totalDailyPool + weeklyTasks)) * 100) : 0;
        },

        // Analytics Logic
        get topHabits() { return this.habits.filter(h => h.checked).slice(0, 3).map(h => ({title: h.title, score: 1})); },
        get bottomHabits() { return this.habits.filter(h => !h.checked).slice(0, 3); },
        get categoryBreakdown() {
          const res = {};
          this.habits.forEach(h => { res[h.category] = (res[h.category] || 0) + h.duration; });
          return res;
        },
        get totalMins() { return Object.values(this.categoryBreakdown).reduce((a,b) => a+b, 0) || 1; },
        blockEfficiency(block) {
          const items = this.habits.filter(h => h.timeOfDay === block);
          return items.length ? Math.round((items.filter(i => i.checked).length / items.length) * 100) : 0;
        },

        setupSortable() {
          this.$nextTick(() => {
            ['morning', 'afternoon', 'evening'].forEach(block => {
              new Sortable(document.getElementById('list-' + block), {
                group: 'shared', handle: '.drag-handle', animation: 150,
                onEnd: (evt) => {
                  const id = evt.item.dataset.id;
                  const newTime = evt.to.dataset.time;
                  const newOrders = {};
                  Array.from(evt.to.children).forEach((el, i) => { newOrders[el.dataset.id] = i; });
                  
                  if (id.startsWith('h_')) { this.healthPrefs[id].timeOfDay = newTime; } 
                  else { 
                    const h = this.habits.find(x => x.id == id);
                    if (h) h.timeOfDay = newTime;
                  }

                  this.habits.forEach(h => { if (newOrders[h.id] !== undefined) h.order = newOrders[h.id]; });
                  Object.keys(this.healthPrefs).forEach(k => { if (newOrders[k] !== undefined) this.healthPrefs[k].order = newOrders[k]; });
                  this.habits = [...this.habits];
                }
              });
            });
          });
        }
      }))
    })
  </script>
</body>
</html>
