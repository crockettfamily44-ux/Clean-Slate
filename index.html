<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Clean Slate</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/sortablejs@latest/Sortable.min.js"></script>
  <script defer src="https://cdn.jsdelivr.net/npm/@alpinejs/persist@3.x.x/dist/cdn.min.js"></script>
  <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
  <style> 
    [x-cloak] { display: none !important; } 
    .sortable-ghost { opacity: 0.4; transform: scale(0.95); }
    .sortable-drag { box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.1), 0 10px 10px -5px rgba(0, 0, 0, 0.04); }
    
    /* Celebration Animation */
    @keyframes gentlePop {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.03); }
    }
    .animate-celebrate {
      animation: gentlePop 0.5s ease-in-out;
    }
  </style>
</head>
<body class="bg-gradient-to-br from-slate-50 via-white to-slate-100 font-sans text-slate-900 antialiased overflow-x-hidden selection:bg-emerald-100 min-h-screen" x-data="habitApp">

  <audio id="clickSound" src="https://assets.mixkit.co/active_storage/sfx/2995/2995-preview.mp3" preload="auto"></audio>

  <div class="w-full pb-40">
    <div class="max-w-7xl mx-auto p-6 md:p-10">
      
      <!-- HEADER -->
      <header class="flex flex-col xl:flex-row justify-between items-start xl:items-end mb-12 gap-6">
        <div>
          <div class="flex items-center gap-4">
            <input type="file" x-ref="profileUpload" accept="image/*" class="hidden" @change="handleProfileUpload">
            <div @click="$refs.profileUpload.click()" class="w-14 h-14 rounded-full border border-slate-200 bg-slate-50 overflow-hidden cursor-pointer shadow-sm hover:border-emerald-500 transition-all flex items-center justify-center shrink-0">
              <template x-if="profileImage"><img :src="profileImage" class="w-full h-full object-cover"></template>
              <template x-if="!profileImage"><svg class="h-6 w-6 text-slate-300" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z" /></svg></template>
            </div>
            <div>
              <h1 class="text-4xl font-light tracking-tight text-slate-800">Clean Slate.</h1>
              <p class="text-slate-500 mt-1 font-medium text-sm">
                <span x-text="currentDayString" class="font-bold text-emerald-600"></span> • 
                <span x-text="currentDayHabits.length"></span> active goals
              </p>
            </div>
          </div>
          
          <div class="flex flex-wrap gap-2 mt-6">
            <button @click="openAddModal()" class="text-sm font-medium text-white bg-slate-800 hover:bg-slate-700 transition-colors px-5 py-2 rounded-full shadow-sm active:scale-95 tracking-tight">+ Add Habit</button>
            <button @click="isEditing = !isEditing" :class="isEditing ? 'bg-emerald-50 text-emerald-700 border-emerald-200' : 'bg-white text-slate-600 border-slate-200'" class="text-sm font-medium border transition-all px-5 py-2 rounded-full w-24 active:scale-95 shadow-sm">
              <span x-text="isEditing ? 'Done' : 'Edit'"></span>
            </button>
          </div>
        </div>

        <!-- HEALTH SYNC PANEL -->
        <div class="w-full md:w-64 bg-white p-4 rounded-2xl shadow-sm border border-slate-200 flex flex-col justify-between">
          <div class="flex justify-between items-center mb-3">
            <span class="text-[10px] uppercase tracking-widest text-slate-400 font-bold flex items-center gap-1">
              <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4 text-emerald-400" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z" /></svg> Health Sync
            </span>
          </div>
          <div class="space-y-2.5">
            <div>
              <div class="flex justify-between text-[10px] font-bold mb-1"><span class="text-rose-400">CALORIES</span><span class="text-slate-500"><span x-text="healthData.calories"></span> / <span x-text="healthData.goalCalories"></span></span></div>
              <div class="w-full h-1.5 bg-slate-100 rounded-full overflow-hidden"><div class="h-full bg-rose-400 rounded-full transition-all" :style="`width: ${Math.min((healthData.calories / healthData.goalCalories) * 100, 100)}%`"></div></div>
            </div>
            <div>
              <div class="flex justify-between text-[10px] font-bold mb-1"><span class="text-emerald-400">EXERCISE</span><span class="text-slate-500"><span x-text="healthData.exercise"></span> / <span x-text="healthData.goalExercise"></span> m</span></div>
              <div class="w-full h-1.5 bg-slate-100 rounded-full overflow-hidden"><div class="h-full bg-emerald-400 rounded-full transition-all" :style="`width: ${Math.min((healthData.exercise / healthData.goalExercise) * 100, 100)}%`"></div></div>
            </div>
            <div>
              <div class="flex justify-between text-[10px] font-bold mb-1"><span class="text-cyan-400">SLEEP</span><span class="text-slate-500"><span x-text="healthData.sleep"></span> / <span x-text="healthData.goalSleep"></span> h</span></div>
              <div class="w-full h-1.5 bg-slate-100 rounded-full overflow-hidden"><div class="h-full bg-cyan-400 rounded-full transition-all" :style="`width: ${Math.min((healthData.sleep / healthData.goalSleep) * 100, 100)}%`"></div></div>
            </div>
          </div>
        </div>
      </header>

      <!-- === TODAY SECTION === -->
      <section class="mb-16">
        <h2 class="text-2xl font-light mb-8 text-slate-800 border-b border-slate-200 pb-2">Today</h2>
        <div class="grid grid-cols-1 md:grid-cols-4 gap-6">
          <template x-for="timeBlock in ['day', 'morning', 'afternoon', 'evening']" :key="timeBlock">
            <div :class="sectionProgress('daily', timeBlock) === 100 && combinedHabits.filter(h => h.timeframe === 'daily' && h.timeOfDay === timeBlock).length > 0 ? 'animate-celebrate' : ''">
              
              <div class="mb-4">
                <h3 class="text-xs uppercase tracking-widest text-slate-500 font-bold flex justify-between items-end">
                  <span x-text="timeBlock === 'day' ? 'Anytime' : timeBlock"></span>
                  <span class="text-[9px] text-slate-400 font-normal" x-text="sectionProgress('daily', timeBlock) + '%'"></span>
                </h3>
                <div class="w-full h-1 bg-slate-100 rounded-full overflow-hidden mt-1">
                  <div class="h-full bg-emerald-400 transition-all duration-700" :style="'width: ' + sectionProgress('daily', timeBlock) + '%'"></div>
                </div>
              </div>
              
              <div :id="'list-' + timeBlock" :data-time="timeBlock" class="min-h-[100px] space-y-3">
                <template x-for="habit in combinedHabits.filter(h => h.timeframe === 'daily' && h.timeOfDay === timeBlock && h.days.includes(currentDayString))" :key="habit.id">
                  
                  <!-- HABIT TILE -->
                  <div :data-id="habit.id" 
                       x-data="{ showLog: false, logVal: '', isCustom: false }"
                       :class="[
                          isEditing && !habit.isWatch ? 'border-emerald-300 border-dashed bg-white' : 'border-slate-200 bg-white shadow-sm hover:shadow-md',
                          habit.isWatch ? 'border-slate-200 bg-slate-50/50' : ''
                       ]"
                       class="relative overflow-hidden border rounded-xl transition-all duration-300 group">
                    
                    <!-- Progressive Background Fill -->
                    <div class="absolute left-0 top-0 h-full transition-all duration-700 ease-in-out z-0"
                         :class="(habit.progress || 0) >= getSmartTarget(habit.target) ? 'bg-emerald-100/70' : 'bg-slate-50'"
                         :style="`width: ${Math.min(((habit.progress || 0) / getSmartTarget(habit.target)) * 100, 100)}%`"></div>

                    <div class="relative z-10 p-4">
                      <div class="flex items-center gap-2">
                        
                        <!-- Drag Handle -->
                        <div x-show="!isEditing" class="drag-handle text-slate-300 hover:text-slate-500 cursor-grab active:cursor-grabbing p-1 -ml-2 shrink-0">
                          <svg class="w-4 h-4" fill="currentColor" viewBox="0 0 24 24"><path d="M8 6a2 2 0 1 1-4 0 2 2 0 0 1 4 0zM8 12a2 2 0 1 1-4 0 2 2 0 0 1 4 0zM8 18a2 2 0 1 1-4 0 2 2 0 0 1 4 0zM20 6a2 2 0 1 1-4 0 2 2 0 0 1 4 0zM20 12a2 2 0 1 1-4 0 2 2 0 0 1 4 0zM20 18a2 2 0 1 1-4 0 2 2 0 0 1 4 0z"/></svg>
                        </div>

                        <!-- Content & Quick Complete -->
                        <div class="flex-1 min-w-0 cursor-pointer" @click="if(!isEditing && !habit.isWatch) quickComplete(habit);">
                          <div class="flex items-center gap-1.5 mb-0.5">
                            <span class="text-sm" x-text="habit.isWatch ? '⌚' : categoryIcons[habit.category]"></span>
                            <p class="text-[9px] uppercase tracking-widest font-bold text-slate-400 truncate" x-text="habit.category"></p>
                          </div>
                          <div class="flex justify-between items-center">
                            <h2 :class="(habit.progress || 0) >= getSmartTarget(habit.target) && !isEditing ? 'text-emerald-800 line-through opacity-70' : 'text-slate-800'" 
                                class="text-base font-semibold transition-colors truncate" 
                                x-text="habit.title"></h2>
                            
                            <span class="text-xs font-medium text-slate-500 shrink-0 ml-2">
                              <span x-text="habit.progress || 0"></span> / <span x-text="getSmartTarget(habit.target)"></span>
                              <span x-text="habit.goalType === 'duration' ? 'm' : ''" class="text-[9px]"></span>
                            </span>
                          </div>
                        </div>

                        <!-- Actions (Edit/Log) -->
                        <div class="shrink-0 flex items-center">
                          <template x-if="!isEditing && !habit.isWatch && (habit.progress || 0) < getSmartTarget(habit.target)">
                            <button @click.stop="showLog = !showLog; isCustom = false;" class="ml-2 text-xs border border-slate-200 bg-white rounded px-2 py-1 text-slate-500 hover:bg-slate-50 shadow-sm">Log</button>
                          </template>
                          
                          <template x-if="isEditing && !habit.isWatch">
                            <div class="flex gap-2 ml-2">
                              <button @click.stop="openEditModal(habit)" class="text-slate-400 hover:text-slate-800"><svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path d="M15.232 5.232l3.536 3.536m-2.036-5.036a2.5 2.5 0 113.536 3.536L6.5 21.036H3v-3.572L16.732 3.732z"/></svg></button>
                              <button @click.stop="deleteHabit(habit.id)" class="text-red-400 hover:text-red-600 font-bold">&times;</button>
                            </div>
                          </template>
                        </div>
                      </div>

                      <!-- Log Dropdown -->
                      <div x-show="showLog" x-cloak x-collapse class="mt-3 pt-3 border-t border-slate-100/50">
                        <template x-if="!isCustom">
                          <select x-model="logVal" 
                                  @change="if(logVal==='custom'){ isCustom=true; logVal=''; } else if(logVal){ logTime(habit, parseInt(logVal)); showLog=false; logVal=''; }" 
                                  class="w-full bg-white border border-slate-200 rounded p-1.5 text-sm text-slate-600 outline-none">
                            <option value="">Select time...</option>
                            <template x-for="i in 24"><option :value="i*5" x-text="(i*5) + ' mins'"></option></template>
                            <option value="custom">Custom...</option>
                          </select>
                        </template>
                        <template x-if="isCustom">
                          <form @submit.prevent="if(logVal){ logTime(habit, parseInt(logVal)); showLog=false; isCustom=false; logVal=''; }" class="flex gap-2">
                            <input type="number" x-model="logVal" placeholder="Minutes..." class="w-full border border-slate-200 rounded p-1.5 text-sm bg-white outline-none" autofocus>
                            <button type="submit" class="bg-slate-800 text-white px-3 py-1.5 rounded text-sm font-medium hover:bg-slate-700">Save</button>
                          </form>
                        </template>
                      </div>

                    </div>
                  </div>
                  <!-- END HABIT TILE -->

                </template>
                <div x-show="combinedHabits.filter(h => h.timeframe === 'daily' && h.timeOfDay === timeBlock && h.days.includes(currentDayString)).length === 0" class="text-xs text-slate-400 italic text-center py-2">No tasks</div>
              </div>
            </div>
          </template>
        </div>
      </section>

      <hr class="my-12 border-slate-200" />

      <!-- === WEEKLY SECTION === -->
      <section class="text-center flex flex-col items-center mb-12">
        <h2 class="text-2xl font-light mb-6 text-slate-800 tracking-tight">This Week</h2>
        <div class="w-full max-w-md flex flex-col gap-3" :class="sectionProgress('weekly', 'none') === 100 && combinedHabits.filter(h => h.timeframe === 'weekly').length > 0 ? 'animate-celebrate' : ''">
          <template x-for="habit in combinedHabits.filter(h => h.timeframe === 'weekly')" :key="habit.id">
            <!-- Reuse Tile Layout for larger timeframes (No Drag Handle, Centered Logic) -->
            <div :data-id="habit.id" x-data="{ showLog: false, logVal: '', isCustom: false }" class="relative overflow-hidden border rounded-xl text-left bg-white shadow-sm transition-all duration-300">
              <div class="absolute left-0 top-0 h-full transition-all duration-700 ease-in-out z-0" :class="(habit.progress || 0) >= getSmartTarget(habit.target) ? 'bg-indigo-100/70' : 'bg-slate-50'" :style="`width: ${Math.min(((habit.progress || 0) / getSmartTarget(habit.target)) * 100, 100)}%`"></div>
              <div class="relative z-10 p-4">
                <div class="flex items-center gap-2">
                  <div class="flex-1 min-w-0 cursor-pointer" @click="if(!isEditing) quickComplete(habit);">
                    <div class="flex justify-between items-center">
                      <h2 :class="(habit.progress || 0) >= getSmartTarget(habit.target) && !isEditing ? 'text-indigo-800 line-through opacity-70' : 'text-slate-800'" class="text-base font-semibold truncate" x-text="habit.title"></h2>
                      <span class="text-xs font-medium text-slate-500 shrink-0 ml-2">
                        <span x-text="habit.progress || 0"></span> / <span x-text="getSmartTarget(habit.target)"></span>
                      </span>
                    </div>
                  </div>
                  <div class="shrink-0 flex items-center">
                    <template x-if="!isEditing && (habit.progress || 0) < getSmartTarget(habit.target)">
                      <button @click.stop="showLog = !showLog; isCustom = false;" class="ml-2 text-xs border border-slate-200 bg-white rounded px-2 py-1 text-slate-500">Log</button>
                    </template>
                    <template x-if="isEditing"><button @click.stop="deleteHabit(habit.id)" class="text-red-400 font-bold ml-3">&times;</button></template>
                  </div>
                </div>
                <!-- Log Dropdown -->
                <div x-show="showLog" x-cloak x-collapse class="mt-3 pt-3 border-t border-slate-100/50">
                  <template x-if="!isCustom">
                    <select x-model="logVal" @change="if(logVal==='custom'){ isCustom=true; logVal=''; } else if(logVal){ logTime(habit, parseInt(logVal)); showLog=false; logVal=''; }" class="w-full bg-white border border-slate-200 rounded p-1.5 text-sm outline-none">
                      <option value="">Select time...</option>
                      <template x-for="i in 24"><option :value="i*5" x-text="(i*5) + ' mins'"></option></template>
                      <option value="custom">Custom...</option>
                    </select>
                  </template>
                  <template x-if="isCustom">
                    <form @submit.prevent="if(logVal){ logTime(habit, parseInt(logVal)); showLog=false; isCustom=false; logVal=''; }" class="flex gap-2">
                      <input type="number" x-model="logVal" placeholder="Amount..." class="w-full border border-slate-200 rounded p-1.5 text-sm outline-none" autofocus>
                      <button type="submit" class="bg-slate-800 text-white px-3 py-1.5 rounded text-sm">Save</button>
                    </form>
                  </template>
                </div>
              </div>
            </div>
          </template>
          <div x-show="combinedHabits.filter(h => h.timeframe === 'weekly').length === 0" class="text-xs text-slate-400 italic py-2">No weekly tasks</div>
        </div>
      </section>

      <hr class="my-12 border-slate-200" />

      <!-- === MONTHLY SECTION === -->
      <section class="text-center flex flex-col items-center mb-12">
        <h2 class="text-2xl font-light mb-6 text-slate-800 tracking-tight">This Month</h2>
        <div class="w-full max-w-md flex flex-col gap-3" :class="sectionProgress('monthly', 'none') === 100 && combinedHabits.filter(h => h.timeframe === 'monthly').length > 0 ? 'animate-celebrate' : ''">
          <template x-for="habit in combinedHabits.filter(h => h.timeframe === 'monthly')" :key="habit.id">
            <!-- Monthly Tile (Exact same structure as weekly, different color logic if desired) -->
            <div :data-id="habit.id" x-data="{ showLog: false, logVal: '', isCustom: false }" class="relative overflow-hidden border rounded-xl text-left bg-white shadow-sm transition-all duration-300">
              <div class="absolute left-0 top-0 h-full transition-all duration-700 ease-in-out z-0" :class="(habit.progress || 0) >= getSmartTarget(habit.target) ? 'bg-cyan-100/70' : 'bg-slate-50'" :style="`width: ${Math.min(((habit.progress || 0) / getSmartTarget(habit.target)) * 100, 100)}%`"></div>
              <div class="relative z-10 p-4">
                <div class="flex items-center gap-2">
                  <div class="flex-1 min-w-0 cursor-pointer" @click="if(!isEditing) quickComplete(habit);">
                    <div class="flex justify-between items-center">
                      <h2 :class="(habit.progress || 0) >= getSmartTarget(habit.target) && !isEditing ? 'text-cyan-800 line-through opacity-70' : 'text-slate-800'" class="text-base font-semibold truncate" x-text="habit.title"></h2>
                      <span class="text-xs font-medium text-slate-500 shrink-0 ml-2">
                        <span x-text="habit.progress || 0"></span> / <span x-text="getSmartTarget(habit.target)"></span>
                      </span>
                    </div>
                  </div>
                  <div class="shrink-0 flex items-center">
                    <template x-if="!isEditing && (habit.progress || 0) < getSmartTarget(habit.target)">
                      <button @click.stop="showLog = !showLog; isCustom = false;" class="ml-2 text-xs border border-slate-200 bg-white rounded px-2 py-1 text-slate-500">Log</button>
                    </template>
                    <template x-if="isEditing"><button @click.stop="deleteHabit(habit.id)" class="text-red-400 font-bold ml-3">&times;</button></template>
                  </div>
                </div>
                <!-- Log Dropdown -->
                <div x-show="showLog" x-cloak x-collapse class="mt-3 pt-3 border-t border-slate-100/50">
                  <template x-if="!isCustom">
                    <select x-model="logVal" @change="if(logVal==='custom'){ isCustom=true; logVal=''; } else if(logVal){ logTime(habit, parseInt(logVal)); showLog=false; logVal=''; }" class="w-full bg-white border border-slate-200 rounded p-1.5 text-sm outline-none">
                      <option value="">Select time...</option>
                      <template x-for="i in 24"><option :value="i*5" x-text="(i*5) + ' mins'"></option></template>
                      <option value="custom">Custom...</option>
                    </select>
                  </template>
                  <template x-if="isCustom">
                    <form @submit.prevent="if(logVal){ logTime(habit, parseInt(logVal)); showLog=false; isCustom=false; logVal=''; }" class="flex gap-2">
                      <input type="number" x-model="logVal" placeholder="Amount..." class="w-full border border-slate-200 rounded p-1.5 text-sm outline-none" autofocus>
                      <button type="submit" class="bg-slate-800 text-white px-3 py-1.5 rounded text-sm">Save</button>
                    </form>
                  </template>
                </div>
              </div>
            </div>
          </template>
          <div x-show="combinedHabits.filter(h => h.timeframe === 'monthly').length === 0" class="text-xs text-slate-400 italic py-2">No monthly tasks</div>
        </div>
      </section>

      <hr class="my-12 border-slate-200" />

      <!-- === YEARLY SECTION === -->
      <section class="text-center flex flex-col items-center mb-12">
        <h2 class="text-2xl font-light mb-6 text-slate-800 tracking-tight">This Year</h2>
        <div class="w-full max-w-md flex flex-col gap-3" :class="sectionProgress('yearly', 'none') === 100 && combinedHabits.filter(h => h.timeframe === 'yearly').length > 0 ? 'animate-celebrate' : ''">
          <template x-for="habit in combinedHabits.filter(h => h.timeframe === 'yearly')" :key="habit.id">
            <!-- Yearly Tile -->
            <div :data-id="habit.id" x-data="{ showLog: false, logVal: '', isCustom: false }" class="relative overflow-hidden border rounded-xl text-left bg-white shadow-sm transition-all duration-300">
              <div class="absolute left-0 top-0 h-full transition-all duration-700 ease-in-out z-0" :class="(habit.progress || 0) >= getSmartTarget(habit.target) ? 'bg-amber-100/70' : 'bg-slate-50'" :style="`width: ${Math.min(((habit.progress || 0) / getSmartTarget(habit.target)) * 100, 100)}%`"></div>
              <div class="relative z-10 p-4">
                <div class="flex items-center gap-2">
                  <div class="flex-1 min-w-0 cursor-pointer" @click="if(!isEditing) quickComplete(habit);">
                    <div class="flex justify-between items-center">
                      <h2 :class="(habit.progress || 0) >= getSmartTarget(habit.target) && !isEditing ? 'text-amber-800 line-through opacity-70' : 'text-slate-800'" class="text-base font-semibold truncate" x-text="habit.title"></h2>
                      <span class="text-xs font-medium text-slate-500 shrink-0 ml-2">
                        <span x-text="habit.progress || 0"></span> / <span x-text="getSmartTarget(habit.target)"></span>
                      </span>
                    </div>
                  </div>
                  <div class="shrink-0 flex items-center">
                    <template x-if="!isEditing && (habit.progress || 0) < getSmartTarget(habit.target)">
                      <button @click.stop="showLog = !showLog; isCustom = false;" class="ml-2 text-xs border border-slate-200 bg-white rounded px-2 py-1 text-slate-500">Log</button>
                    </template>
                    <template x-if="isEditing"><button @click.stop="deleteHabit(habit.id)" class="text-red-400 font-bold ml-3">&times;</button></template>
                  </div>
                </div>
                <!-- Log Dropdown -->
                <div x-show="showLog" x-cloak x-collapse class="mt-3 pt-3 border-t border-slate-100/50">
                  <template x-if="!isCustom">
                    <select x-model="logVal" @change="if(logVal==='custom'){ isCustom=true; logVal=''; } else if(logVal){ logTime(habit, parseInt(logVal)); showLog=false; logVal=''; }" class="w-full bg-white border border-slate-200 rounded p-1.5 text-sm outline-none">
                      <option value="">Select time...</option>
                      <template x-for="i in 24"><option :value="i*5" x-text="(i*5) + ' mins'"></option></template>
                      <option value="custom">Custom...</option>
                    </select>
                  </template>
                  <template x-if="isCustom">
                    <form @submit.prevent="if(logVal){ logTime(habit, parseInt(logVal)); showLog=false; isCustom=false; logVal=''; }" class="flex gap-2">
                      <input type="number" x-model="logVal" placeholder="Amount..." class="w-full border border-slate-200 rounded p-1.5 text-sm outline-none" autofocus>
                      <button type="submit" class="bg-slate-800 text-white px-3 py-1.5 rounded text-sm">Save</button>
                    </form>
                  </template>
                </div>
              </div>
            </div>
          </template>
          <div x-show="combinedHabits.filter(h => h.timeframe === 'yearly').length === 0" class="text-xs text-slate-400 italic py-2">No yearly tasks</div>
        </div>
      </section>

    </div>
  </div>

  <!-- ADD HABIT MODAL -->
  <div x-show="isAddModalOpen" x-cloak x-transition.opacity class="fixed inset-0 z-50 flex items-center justify-center bg-slate-900/60 backdrop-blur-sm p-4 overflow-y-auto">
    <div @click.away="isAddModalOpen = false" class="bg-white rounded-2xl p-6 w-full max-w-sm shadow-2xl border border-slate-200 my-8">
      <h3 class="text-xl font-semibold mb-4 text-slate-800" x-text="editingHabitId ? 'Edit Goal' : 'New Goal'"></h3>
      
      <div class="space-y-4">
        <div>
          <label class="block text-[10px] font-bold text-slate-400 mb-1 uppercase tracking-wider">Name (Linking via Name)</label>
          <input x-model="newHabit.title" type="text" placeholder="e.g. Walk" class="w-full bg-slate-50 border border-slate-200 rounded-lg px-4 py-2.5 outline-none focus:border-emerald-500 font-medium text-slate-800">
        </div>
        
        <div class="grid grid-cols-2 gap-4">
          <div>
            <label class="block text-[10px] font-bold text-slate-400 mb-1 uppercase tracking-wider">Timeframe</label>
            <select x-model="newHabit.timeframe" class="w-full bg-slate-50 border border-slate-200 rounded-lg px-4 py-2.5 outline-none font-medium text-sm">
              <option value="daily">Daily</option>
              <option value="weekly">Weekly</option>
              <option value="monthly">Monthly</option>
              <option value="yearly">Yearly</option>
            </select>
          </div>
          <div x-show="newHabit.timeframe === 'daily'">
            <label class="block text-[10px] font-bold text-slate-400 mb-1 uppercase tracking-wider">Time of Day</label>
            <select x-model="newHabit.timeOfDay" class="w-full bg-slate-50 border border-slate-200 rounded-lg px-4 py-2.5 outline-none font-medium text-sm">
              <option value="day">Anytime</option>
              <option value="morning">Morning</option>
              <option value="afternoon">Afternoon</option>
              <option value="evening">Evening</option>
            </select>
          </div>
          <div x-show="newHabit.timeframe !== 'daily'">
             <!-- Spacer to keep grid neat if not daily -->
          </div>
        </div>

        <div class="grid grid-cols-2 gap-4">
          <div>
            <label class="block text-[10px] font-bold text-slate-400 mb-1 uppercase tracking-wider">Goal Type</label>
            <select x-model="newHabit.goalType" class="w-full bg-slate-50 border border-slate-200 rounded-lg px-4 py-2.5 outline-none font-medium text-sm">
              <option value="duration">Duration (Time)</option>
              <option value="frequency">Frequency (Events)</option>
            </select>
          </div>
          <div>
            <label class="block text-[10px] font-bold text-slate-400 mb-1 uppercase tracking-wider">Target</label>
            <input x-model="newHabit.target" type="text" placeholder="60, 'week'..." class="w-full bg-slate-50 border border-slate-200 rounded-lg px-4 py-2.5 outline-none focus:border-emerald-500 font-medium text-slate-800 text-sm">
          </div>
        </div>

        <div x-show="newHabit.timeframe === 'daily'">
          <label class="block text-[10px] font-bold text-slate-400 mb-1 uppercase tracking-wider">Active Days</label>
          <div class="flex justify-between gap-1">
            <template x-for="day in daysOfWeek">
              <button @click="toggleDay(day)" :class="newHabit.days.includes(day) ? 'bg-slate-700 text-white border-slate-700' : 'bg-white text-slate-400 border-slate-200'" class="flex-1 py-1.5 text-[10px] font-bold rounded border uppercase transition-colors" x-text="day"></button>
            </template>
          </div>
        </div>
      </div>
      <div class="mt-8 flex gap-3">
        <button @click="isAddModalOpen = false" class="flex-1 bg-white border border-slate-200 text-slate-600 font-bold py-2.5 rounded-lg active:scale-95 text-sm hover:bg-slate-50">Cancel</button>
        <button @click="saveHabit()" class="flex-1 bg-slate-800 border border-slate-900 text-white font-bold py-2.5 rounded-lg shadow-sm active:scale-95 text-sm hover:bg-slate-700">Save Goal</button>
      </div>
    </div>
  </div>

  <script>
    document.addEventListener('alpine:init', () => {
      Alpine.data('habitApp', () => ({
        isEditing: false, isAddModalOpen: false, editingHabitId: null,
        daysOfWeek: ['Mon', 'Tue', 'Wed', 'Thu', 'Fri', 'Sat', 'Sun'],
        currentDayString: new Date().toLocaleDateString('en-US', { weekday: 'short' }),
        profileImage: Alpine.$persist(null),
        categoryIcons: { 'Faith': '🕊️', 'Family': '👨‍👩‍👧', 'Friends/Others': '🤝', 'Health/Sleep': '🏃', 'Work': '💼', 'Home': '🏠', 'Leisure': '📖', 'Health/Sync': '❤️' },
        
        // Data Structure Migration: Now uses progress/target/timeframe instead of pure checked/duration
        habits: Alpine.$persist([
          { id: 1, title: 'Read', timeframe: 'daily', timeOfDay: 'morning', category: 'Leisure', goalType: 'duration', target: 20, progress: 0, order: 0, days: ['Mon', 'Tue', 'Wed', 'Thu', 'Fri', 'Sat', 'Sun'] },
          { id: 2, title: 'Read', timeframe: 'weekly', timeOfDay: 'none', category: 'Leisure', goalType: 'duration', target: 140, progress: 0, order: 1, days: [] }
        ]),
        
        newHabit: { title: '', timeframe: 'daily', timeOfDay: 'day', category: 'Health/Sleep', goalType: 'duration', target: 30, days: ['Mon', 'Tue', 'Wed', 'Thu', 'Fri', 'Sat', 'Sun'] },
        healthPrefs: Alpine.$persist({ h_move: { timeOfDay: 'day', order: -3 }, h_ex: { timeOfDay: 'day', order: -2 }, h_sleep: { timeOfDay: 'morning', order: -1 } }),
        healthData: { calories: 0, goalCalories: 2500, exercise: 0, goalExercise: 30, sleep: 0, goalSleep: 7.5 },
        lastOpenedDate: Alpine.$persist(new Date().toDateString()),

        async fetchHealthData() {
          const supabaseUrl = 'https://vzkkjpaqteiqyomwalzr.supabase.co'; 
          const anonKey = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InZ6a2tqcGFxdGVpcXlvbXdhbHpyIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzgzNjIwNjAsImV4cCI6MjA5MzkzODA2MH0.xu0nctOWwIPWQ5E-MzypSLOhhZmsIj-Np5o992tXN_Q'; 
          const now = new Date();
          const offset = now.getTimezoneOffset();
          const localDate = new Date(now.getTime() - (offset * 60 * 1000));
          const dateString = localDate.toISOString().split('T')[0];
          try {
            const res = await fetch(`${supabaseUrl}/rest/v1/health_metrics?date=eq.${dateString}&select=*`, {
              headers: { 'apikey': anonKey, 'Authorization': `Bearer ${anonKey}` }
            });
            const data = await res.json();
            if (data?.length > 0) {
              const d = data[data.length-1];
              this.healthData.calories = d.calories || 0;
              this.healthData.exercise = d.exercise || 0;
              this.healthData.sleep = d.sleep ? Math.round(d.sleep * 10) / 10 : 0; 
            }
          } catch (e) {}
        },

        init() {
          const today = new Date().toDateString();
          if (this.lastOpenedDate !== today) { 
            // Reset daily progress on new day
            this.habits.forEach(h => { if(h.timeframe === 'daily') h.progress = 0; }); 
            this.lastOpenedDate = today; 
          }
          this.fetchHealthData();
          this.$nextTick(() => { this.setupSortable(); });
        },

        setupSortable() {
          // Sortable only applied to daily columns now
          ['day', 'morning', 'afternoon', 'evening'].forEach(block => {
            const el = document.getElementById('list-' + block);
            if(el) {
              new Sortable(el, {
                group: 'shared', handle: '.drag-handle', animation: 150, onEnd: (evt) => {
                  const id = evt.item.dataset.id;
                  const newTime = evt.to.dataset.time;
                  const newOrders = {};
                  Array.from(evt.to.children).forEach((el, index) => { newOrders[el.dataset.id] = index; });
                  
                  if (id.startsWith('h_')) { this.healthPrefs[id].timeOfDay = newTime; } 
                  else { const h = this.habits.find(h => h.id == id); if(h) h.timeOfDay = newTime; }
                  
                  this.habits.forEach(h => { if (newOrders[h.id] !== undefined) h.order = newOrders[h.id]; });
                  Object.keys(this.healthPrefs).forEach(key => { if (newOrders[key] !== undefined) this.healthPrefs[key].order = newOrders[key]; });
                  
                  this.habits = [...this.habits];
                  this.healthPrefs = {...this.healthPrefs};
                }
              });
            }
          });
        },

        handleProfileUpload(event) {
          const file = event.target.files[0]; if(!file) return;
          const reader = new FileReader(); reader.onload = (e) => { this.profileImage = e.target.result; }; reader.readAsDataURL(file);
        },

        // --- NEW LOGIC: Smart Targets & Cascading Log Time ---

        getSmartTarget(targetStr) {
          if (!targetStr) return 0;
          if (typeof targetStr === 'number') return targetStr;
          
          const s = targetStr.toString().toLowerCase().trim();
          const d = new Date();
          
          if (s === 'week') return 7;
          if (s === 'month') return new Date(d.getFullYear(), d.getMonth() + 1, 0).getDate();
          if (s === 'year') { 
            const y = d.getFullYear(); 
            const isLeap = (y % 4 === 0 && y % 100 !== 0) || y % 400 === 0;
            return isLeap ? 366 : 365; 
          }
          return parseInt(s) || 0;
        },

        logTime(habit, amount) {
          if (!amount || isNaN(amount)) return;
          
          // Cascading Logic: Group habits by exact Title (case insensitive)
          const groupTitle = habit.title.toLowerCase().trim();
          
          this.habits = this.habits.map(h => {
            if (h.title.toLowerCase().trim() === groupTitle) {
              const newProgress = (h.progress || 0) + amount;
              return { ...h, progress: newProgress };
            }
            return h;
          });
          
          document.getElementById('clickSound').cloneNode().play();
        },

        quickComplete(habit) {
          const target = this.getSmartTarget(habit.target);
          const current = habit.progress || 0;
          const needed = target - current;
          
          if (needed > 0) {
            // If it's a frequency, a quick click usually just means "+1 event". 
            // If it's a duration, complete the remaining duration.
            const increment = habit.goalType === 'frequency' ? 1 : needed;
            this.logTime(habit, increment);
          }
        },

        // --- END NEW LOGIC ---

        get combinedHabits() {
          // Inject Health Sync data as virtual daily habits with progress metrics
          const tiles = [
            { id: 'h_move', title: `Hit Calories`, timeframe: 'daily', timeOfDay: this.healthPrefs.h_move.timeOfDay, category: 'Health/Sync', goalType: 'duration', target: this.healthData.goalCalories, progress: this.healthData.calories, isWatch: true, order: this.healthPrefs.h_move.order, days: this.daysOfWeek },
            { id: 'h_ex', title: `Close Exercise`, timeframe: 'daily', timeOfDay: this.healthPrefs.h_ex.timeOfDay, category: 'Health/Sync', goalType: 'duration', target: this.healthData.goalExercise, progress: this.healthData.exercise, isWatch: true, order: this.healthPrefs.h_ex.order, days: this.daysOfWeek },
            { id: 'h_sleep', title: `Hit Sleep Target`, timeframe: 'daily', timeOfDay: this.healthPrefs.h_sleep.timeOfDay, category: 'Health/Sync', goalType: 'duration', target: this.healthData.goalSleep, progress: this.healthData.sleep, isWatch: true, order: this.healthPrefs.h_sleep.order, days: this.daysOfWeek }
          ];
          return [...tiles, ...this.habits].sort((a, b) => (a.order || 0) - (b.order || 0));
        },

        get currentDayHabits() { 
          return this.combinedHabits.filter(h => h.timeframe === 'daily' && h.days.includes(this.currentDayString)); 
        },

        sectionProgress(timeframe, timeOfDay) {
          let items;
          if (timeframe === 'daily') {
            items = this.currentDayHabits.filter(h => h.timeOfDay === timeOfDay);
          } else {
            items = this.combinedHabits.filter(h => h.timeframe === timeframe);
          }
          
          if(items.length === 0) return 0;
          
          // Calculate overall section fill percentage
          let totalTarget = 0;
          let totalProgress = 0;
          
          items.forEach(h => {
            const t = this.getSmartTarget(h.target);
            totalTarget += t;
            totalProgress += Math.min((h.progress || 0), t); // Cap at 100% per item so overachieving doesn't mask incomplete tasks
          });
          
          if(totalTarget === 0) return 0;
          return Math.round((totalProgress / totalTarget) * 100);
        },

        deleteHabit(id) { this.habits = this.habits.filter(h => h.id !== id); },
        toggleDay(d) { if (this.newHabit.days.includes(d)) { this.newHabit.days = this.newHabit.days.filter(x => x !== d); } else { this.newHabit.days.push(d); } },
        
        openAddModal() { 
          this.editingHabitId = null; 
          this.newHabit = { title: '', timeframe: 'daily', timeOfDay: 'day', category: 'Health/Sleep', goalType: 'duration', target: '', days: [...this.daysOfWeek] }; 
          this.isAddModalOpen = true; 
        },
        
        openEditModal(h) { 
          this.editingHabitId = h.id; 
          Object.assign(this.newHabit, h); 
          this.newHabit.days = h.days ? [...h.days] : []; 
          this.isAddModalOpen = true; 
        },

        saveHabit() {
          if (!this.newHabit.title.trim()) return;
          
          if (this.editingHabitId) {
            const h = this.habits.find(h => h.id === this.editingHabitId);
            if (h) { Object.assign(h, this.newHabit); }
          } else {
            this.habits.push({ 
              id: Date.now(), 
              ...this.newHabit, 
              progress: 0, 
              order: 999 
            });
          }
          this.isAddModalOpen = false;
        }

      }))
    })
  </script>
</body>
</html>
